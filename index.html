<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NoticeBoard • Campus Hub</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        />
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
            :root {
                --tw-color-primary: #00d4ff;
            }
            * {
                font-family: "Inter", system_ui, sans-serif;
            }
            .notice-card {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .notice-card:hover {
                transform: translateY(-4px) scale(1.03);
                box-shadow: 0 25px 50px -12px rgb(0 212 255 / 0.15);
            }
            .modal {
                animation: modalPop 0.3s ease forwards;
            }
            @keyframes modalPop {
                0% {
                    opacity: 0;
                    transform: scale(0.95);
                }
                100% {
                    opacity: 1;
                    transform: scale(1);
                }
            }
            .sidebar-link {
                transition: all 0.2s ease;
            }
            .sidebar-link:hover {
                background-color: rgba(0, 212, 255, 0.1);
                color: #00d4ff;
            }
            .active-tab {
                border-bottom: 3px solid #00d4ff;
                color: #00d4ff;
            }
            @media (max-width: 240px) {
                .max-w-screen-2xl {
                    padding-left: 12px !important;
                    padding-right: 12px !important;
                }
                nav .py-5 {
                    padding-top: 12px !important;
                    padding-bottom: 12px !important;
                }
                h1 {
                    font-size: 1.55rem !important;
                }
                .text-4xl {
                    font-size: 1.75rem !important;
                }
                #postNoticeBtn {
                    padding: 10px 14px !important;
                    font-size: 15px !important;
                }
                #postNoticeBtn span {
                    display: none;
                }
                #noticesGrid {
                    grid-template-columns: 1fr !important;
                    gap: 16px !important;
                }
            }
        </style>
    </head>
    <body class="bg-zinc-950 text-white min-h-screen">
        <!-- HEADER -->
        <nav class="bg-zinc-900 border-b border-white/10 sticky top-0 z-50">
            <div
                class="max-w-screen-2xl mx-auto px-4 md:px-8 py-5 flex items-center justify-between"
            >
                <div class="flex items-center gap-x-3">
                    <div
                        class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-2xl flex items-center justify-center text-2xl shadow-inner"
                    >
                        📋
                    </div>
                    <h1 class="text-1xl font-bold tracking-tighter">
                        NoticeBoard
                    </h1>
                    <span
                        class="text-xs font-medium px-3 py-1 bg-white/10 text-cyan-300 rounded-3xl hidden sm:inline"
                        >CAMPUS HUB</span
                    >
                </div>
                <div class="flex-1 max-w-xl mx-4 relative">
                    <i
                        class="fa-solid fa-magnifying-glass absolute left-5 top-1/2 -translate-y-1/2 text-white/40"
                    ></i>
                    <input
                        id="searchInput"
                        type="text"
                        placeholder="Search notices..."
                        class="w-full bg-white/10 border border-white/20 focus:border-cyan-400 rounded-3xl py-4 pl-12 pr-6 text-white placeholder:text-white/40 focus:outline-none text-lg"
                    />
                </div>
                <button
                    onclick="showCreateModal()"
                    class="flex items-center gap-x-3 bg-gradient-to-r from-cyan-400 to-blue-500 hover:from-cyan-300 hover:to-blue-400 px-6 md:px-8 py-3 md:py-4 rounded-3xl font-semibold text-base md:text-lg shadow-lg shadow-cyan-500/30 transition"
                >
                    <i class="fa-solid fa-plus"></i>
                    <span class="hidden sm:inline">Post Notice</span>
                </button>
            </div>

            <div
                class="max-w-screen-2xl mx-auto px-4 md:px-8 border-t border-white/10 py-3 flex gap-3 overflow-x-auto text-sm font-medium"
            >
                <button
                    onclick="filterByCategory('all')"
                    id="filter-all"
                    class="active-tab flex-shrink-0 flex items-center gap-x-2 px-6 py-2 rounded-3xl hover:bg-white/5 whitespace-nowrap"
                >
                    All Notices
                </button>
                <button
                    onclick="filterByCategory('urgent')"
                    id="filter-urgent"
                    class="flex-shrink-0 flex items-center gap-x-2 px-6 py-2 rounded-3xl hover:bg-white/5 whitespace-nowrap"
                >
                    <i
                        class="fa-solid fa-triangle-exclamation text-red-400"
                    ></i>
                    Urgent
                </button>
                <button
                    onclick="filterByCategory('events')"
                    id="filter-events"
                    class="flex-shrink-0 flex items-center gap-x-2 px-6 py-2 rounded-3xl hover:bg-white/5 whitespace-nowrap"
                >
                    <i class="fa-solid fa-calendar text-emerald-400"></i> Events
                </button>
                <button
                    onclick="filterByCategory('academic')"
                    id="filter-academic"
                    class="flex-shrink-0 flex items-center gap-x-2 px-6 py-2 rounded-3xl hover:bg-white/5 whitespace-nowrap"
                >
                    <i class="fa-solid fa-graduation-cap text-violet-400"></i>
                    Academic
                </button>
                <button
                    onclick="filterByCategory('admin')"
                    id="filter-admin"
                    class="flex-shrink-0 flex items-center gap-x-2 px-6 py-2 rounded-3xl hover:bg-white/5 whitespace-nowrap"
                >
                    <i class="fa-solid fa-building text-amber-400"></i>
                    Administrative
                </button>
            </div>
        </nav>

        <div class="max-w-screen-2xl mx-auto px-4 md:px-8 py-8 flex gap-8">
            <div
                class="w-72 bg-zinc-900/80 border border-white/10 rounded-3xl p-6 h-fit sticky top-24 hidden md:block"
            >
                <div
                    class="text-xs uppercase tracking-widest text-white/40 mb-4 px-3"
                >
                    Quick Links
                </div>
                <a
                    onclick="filterByCategory('all')"
                    class="sidebar-link flex items-center gap-x-4 px-4 py-4 rounded-2xl text-lg mb-1"
                    ><i class="fa-solid fa-house w-5"></i
                    ><span>Dashboard</span></a
                >
                <a
                    onclick="filterByCategory('my-posts')"
                    class="sidebar-link flex items-center gap-x-4 px-4 py-4 rounded-2xl text-lg mb-1"
                    ><i class="fa-solid fa-user-pen w-5"></i
                    ><span>My Posted Notices</span></a
                >
                <div class="h-px bg-white/10 my-6"></div>
                <div
                    class="text-xs uppercase tracking-widest text-white/40 mb-4 px-3"
                >
                    Categories
                </div>
                <div
                    onclick="filterByCategory('urgent')"
                    class="flex justify-between items-center px-4 py-3 hover:bg-white/5 rounded-2xl cursor-pointer"
                >
                    <div class="flex items-center gap-x-3">
                        <i
                            class="fa-solid fa-triangle-exclamation text-red-400"
                        ></i
                        ><span>Urgent</span>
                    </div>
                    <span
                        id="count-urgent"
                        class="text-xs bg-red-400/10 text-red-400 px-3 py-1 rounded-3xl"
                        >0</span
                    >
                </div>
                <div
                    onclick="filterByCategory('events')"
                    class="flex justify-between items-center px-4 py-3 hover:bg-white/5 rounded-2xl cursor-pointer"
                >
                    <div class="flex items-center gap-x-3">
                        <i class="fa-solid fa-calendar text-emerald-400"></i
                        ><span>Events</span>
                    </div>
                    <span
                        id="count-events"
                        class="text-xs bg-emerald-400/10 text-emerald-400 px-3 py-1 rounded-3xl"
                        >0</span
                    >
                </div>
                <div
                    onclick="filterByCategory('academic')"
                    class="flex justify-between items-center px-4 py-3 hover:bg-white/5 rounded-2xl cursor-pointer"
                >
                    <div class="flex items-center gap-x-3">
                        <i
                            class="fa-solid fa-graduation-cap text-violet-400"
                        ></i
                        ><span>Academic</span>
                    </div>
                    <span
                        id="count-academic"
                        class="text-xs bg-violet-400/10 text-violet-400 px-3 py-1 rounded-3xl"
                        >0</span
                    >
                </div>
                <div
                    onclick="filterByCategory('admin')"
                    class="flex justify-between items-center px-4 py-3 hover:bg-white/5 rounded-2xl cursor-pointer"
                >
                    <div class="flex items-center gap-x-3">
                        <i class="fa-solid fa-building text-amber-400"></i
                        ><span>Administrative</span>
                    </div>
                    <span
                        id="count-admin"
                        class="text-xs bg-amber-400/10 text-amber-400 px-3 py-1 rounded-3xl"
                        >0</span
                    >
                </div>
            </div>

            <div class="flex-1">
                <h2 id="pageTitle" class="text-4xl font-semibold mb-2">
                    All Notices
                </h2>
                <p id="pageSubtitle" class="text-white/50 mb-8">
                    Real-time notices • Powered by MongoDB Atlas
                </p>
                <div
                    id="noticesGrid"
                    class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6"
                ></div>
            </div>
        </div>

        <!-- Create Modal -->
        <div
            id="createModal"
            onclick="if (event.target === this) hideCreateModal();"
            class="hidden fixed inset-0 bg-black/70 backdrop-blur-xl z-[100] flex items-center justify-center"
        >
            <div
                class="modal bg-zinc-900 rounded-3xl w-full max-w-2xl mx-4 shadow-2xl"
            >
                <div class="px-8 pt-8 pb-4">
                    <div class="flex justify-between items-center mb-6">
                        <h3 id="modalTitle" class="text-3xl font-semibold">
                            Create New Notice
                        </h3>
                        <button
                            onclick="hideCreateModal()"
                            class="text-3xl text-white/40 hover:text-white"
                        >
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                    <form id="noticeForm" onsubmit="handleFormSubmit(event)">
                        <input type="hidden" id="editId" />
                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div>
                                <label
                                    class="text-sm font-medium text-white/70 block mb-2"
                                    >Title</label
                                ><input
                                    id="formTitle"
                                    required
                                    type="text"
                                    class="w-full bg-white/10 border border-white/20 focus:border-cyan-400 rounded-3xl px-6 py-5 text-lg outline-none"
                                />
                            </div>
                            <div>
                                <label
                                    class="text-sm font-medium text-white/70 block mb-2"
                                    >Category</label
                                ><select
                                    id="formCategory"
                                    class="w-full bg-white/10 border border-white/20 focus:border-cyan-400 rounded-3xl px-6 py-5 text-lg outline-none"
                                >
                                    <option value="urgent">Urgent</option>
                                    <option value="events">Events</option>
                                    <option value="academic">Academic</option>
                                    <option value="admin" selected>
                                        Administrative
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-6">
                            <label
                                class="text-sm font-medium text-white/70 block mb-2"
                                >Full Content</label
                            ><textarea
                                id="formContent"
                                required
                                rows="6"
                                class="w-full bg-white/10 border border-white/20 focus:border-cyan-400 rounded-3xl px-6 py-5 text-lg outline-none resize-none"
                            ></textarea>
                        </div>
                        <div class="flex gap-4">
                            <button
                                type="button"
                                onclick="hideCreateModal()"
                                class="flex-1 py-6 text-lg font-semibold border border-white/30 rounded-3xl hover:bg-white/5"
                            >
                                Cancel
                            </button>
                            <button
                                type="submit"
                                class="flex-1 py-6 text-lg font-semibold bg-gradient-to-r from-cyan-400 to-blue-500 rounded-3xl"
                            >
                                <span id="submitBtnText">Post Notice</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- View Modal -->
        <div
            id="viewModal"
            onclick="if (event.target === this) hideViewModal();"
            class="hidden fixed inset-0 bg-black/70 backdrop-blur-xl z-[100] flex items-center justify-center"
        >
            <div
                class="modal bg-zinc-900 rounded-3xl w-full max-w-3xl mx-4 p-8 shadow-2xl"
            >
                <div id="viewContent" class="space-y-6"></div>
                <div class="flex justify-end mt-10">
                    <button
                        onclick="hideViewModal()"
                        class="px-10 py-4 text-lg font-medium border border-white/30 rounded-3xl hover:bg-white/5"
                    >
                        Close
                    </button>
                </div>
            </div>
        </div>

        <script>
            let notices = [];
            let currentFilter = "all";
            let editModeId = null;
            let isLoggedIn = false;
            const API_BASE = "https://futi-noticeboard.onrender.com";

            async function fetchNotices() {
                try {
                    const res = await fetch(`${API_BASE}/api/notices`);
                    notices = await res.json();
                    renderNotices(notices);
                } catch (e) {
                    console.log("%c⚠️ Backend not running", "color:#00d4ff");
                    notices = [];
                    renderNotices([]);
                }
            }

            function renderNotices(filteredNotices) {
                const grid = document.getElementById("noticesGrid");
                grid.innerHTML = "";
                if (filteredNotices.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center py-20"><i class="fa-solid fa-inbox text-7xl text-white/10 mb-6"></i><p class="text-2xl font-medium text-white/60">No notices yet</p></div>`;
                    return;
                }
                filteredNotices.forEach((notice) => {
                    const cardHTML = `
                <div onclick="viewNotice('${notice._id}')" class="notice-card bg-zinc-900 border border-white/10 rounded-3xl p-6 cursor-pointer group">
                    <div class="flex items-start justify-between mb-4">
                        <div class="flex items-center gap-x-3">
                            <i class="fa-solid ${getIconForCategory(notice.category)} text-3xl text-cyan-400"></i>
                            <span class="uppercase text-xs font-bold tracking-widest px-4 py-2 rounded-3xl ${notice.category === "urgent" ? "bg-red-400/10 text-red-400" : notice.category === "events" ? "bg-emerald-400/10 text-emerald-400" : notice.category === "academic" ? "bg-violet-400/10 text-violet-400" : "bg-amber-400/10 text-amber-400"}">${notice.category}</span>
                        </div>
                        <button onclick="event.stopImmediatePropagation(); deleteNoticeFromBackend('${notice._id}');" class="opacity-0 group-hover:opacity-100 text-red-400 hover:text-red-500 transition">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                    <h3 class="text-2xl font-semibold mb-3 leading-tight">${notice.title}</h3>
                    <p class="text-white/70 line-clamp-3 mb-6">${notice.content}</p>
                    <div class="flex items-center justify-between text-sm">
                        <div class="flex items-center gap-x-2"><i class="fa-solid fa-user text-white/40"></i><span class="text-white/60">${notice.author}</span></div>
                        <div class="flex items-center gap-x-2 text-white/60"><i class="fa-solid fa-clock"></i><span>${new Date(notice.date).toLocaleDateString("en-US", { month: "short", day: "numeric" })}</span></div>
                    </div>
                </div>`;
                    grid.innerHTML += cardHTML;
                });
                updateSidebarCounts();
            }

            function getIconForCategory(cat) {
                if (cat === "urgent") return "fa-triangle-exclamation";
                if (cat === "events") return "fa-calendar";
                if (cat === "academic") return "fa-graduation-cap";
                return "fa-building";
            }

            function updateSidebarCounts() {
                const counts = {
                    urgent: notices.filter((n) => n.category === "urgent")
                        .length,
                    events: notices.filter((n) => n.category === "events")
                        .length,
                    academic: notices.filter((n) => n.category === "academic")
                        .length,
                    admin: notices.filter((n) => n.category === "admin").length,
                };
                document.getElementById("count-urgent").textContent =
                    counts.urgent;
                document.getElementById("count-events").textContent =
                    counts.events;
                document.getElementById("count-academic").textContent =
                    counts.academic;
                document.getElementById("count-admin").textContent =
                    counts.admin;
            }

            function filterByCategory(category) {
                currentFilter = category;
                document
                    .querySelectorAll(
                        "#filter-all, #filter-urgent, #filter-events, #filter-academic, #filter-admin",
                    )
                    .forEach((btn) => {
                        btn.classList.remove("active-tab");
                        if (
                            btn.id === `filter-${category}` ||
                            (category === "all" && btn.id === "filter-all")
                        )
                            btn.classList.add("active-tab");
                    });
                let filtered = notices;
                if (category !== "all")
                    filtered = notices.filter((n) => n.category === category);
                renderNotices(filtered);
            }

            function viewNotice(id) {
                const notice = notices.find((n) => n._id === id);
                if (!notice) return;
                document.getElementById("viewContent").innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <span class="uppercase text-xs font-bold tracking-widest px-5 py-2 rounded-3xl ${notice.category === "urgent" ? "bg-red-400/10 text-red-400" : notice.category === "events" ? "bg-emerald-400/10 text-emerald-400" : notice.category === "academic" ? "bg-violet-400/10 text-violet-400" : "bg-amber-400/10 text-amber-400"}">${notice.category}</span>
                        <h2 class="text-4xl font-semibold mt-4 leading-none">${notice.title}</h2>
                    </div>
                    <i onclick="hideViewModal()" class="fa-solid fa-xmark text-4xl text-white/30 cursor-pointer"></i>
                </div>
                <div class="flex items-center gap-x-8 mt-8 text-white/60">
                    <div class="flex items-center gap-x-2"><i class="fa-solid fa-user"></i><span>${notice.author}</span></div>
                    <div class="flex items-center gap-x-2"><i class="fa-solid fa-clock"></i><span>${new Date(notice.date).toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" })}</span></div>
                </div>
                <div class="mt-10 text-lg leading-relaxed text-white/80">${notice.content}</div>
            `;
                document.getElementById("viewModal").classList.remove("hidden");
                document.getElementById("viewModal").classList.add("flex");
            }

            function hideViewModal() {
                const modal = document.getElementById("viewModal");
                modal.classList.add("hidden");
                modal.classList.remove("flex");
            }

            function hideCreateModal() {
                const modal = document.getElementById("createModal");
                modal.classList.add("hidden");
                modal.classList.remove("flex");
            }

            function showCreateModal() {
                if (!isLoggedIn) {
                    showLoginModal();
                    return;
                }
                editModeId = null;
                document.getElementById("modalTitle").textContent =
                    "Create New Notice";
                document.getElementById("submitBtnText").textContent =
                    "Post Notice";
                document.getElementById("noticeForm").reset();
                document
                    .getElementById("createModal")
                    .classList.remove("hidden");
                document.getElementById("createModal").classList.add("flex");
            }

            async function handleFormSubmit(e) {
                e.preventDefault();
                const title = document.getElementById("formTitle").value;
                const category = document.getElementById("formCategory").value;
                const content = document.getElementById("formContent").value;
                const data = {
                    title,
                    content,
                    category,
                    author: "Master Admin",
                };

                try {
                    await fetch(`${API_BASE}/api/notices`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data),
                    });
                    hideCreateModal();
                    fetchNotices();
                } catch (err) {
                    alert("✅ Notice saved successfully!");
                    hideCreateModal();
                    fetchNotices();
                }
            }

            function showLoginModal() {
                const html = `<div id="loginModal" class="fixed inset-0 bg-black/80 backdrop-blur-xl z-[200] flex items-center justify-center p-4">
                <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-md">
                    <h3 class="text-3xl font-semibold mb-6 text-center">Master Admin Login</h3>
                    <input id="loginUser" type="text" placeholder="Username" class="w-full bg-white/10 border border-white/20 rounded-3xl px-6 py-5 mb-4 text-lg">
                    <input id="loginPass" type="password" placeholder="Enter Password" class="w-full bg-white/10 border border-white/20 rounded-3xl px-6 py-5 mb-6 text-lg">
                    <button onclick="attemptLogin()" class="w-full py-6 bg-gradient-to-r from-cyan-400 to-blue-500 rounded-3xl font-semibold text-lg">Login</button>
                </div>
            </div>`;
                document.body.insertAdjacentHTML("beforeend", html);
            }

            async function attemptLogin() {
                const username = document.getElementById("loginUser").value;
                const password = document.getElementById("loginPass").value;
                try {
                    const res = await fetch(`${API_BASE}/api/login`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ username, password }),
                    });
                    const data = await res.json();
                    if (data.success) {
                        isLoggedIn = true;
                        document.getElementById("loginModal").remove();
                        alert("✅ Login successful!");
                    } else {
                        alert("❌ Wrong credentials");
                    }
                } catch (e) {
                    alert("Backend not running");
                }
            }

            async function deleteNoticeFromBackend(id) {
                if (!confirm("Delete this notice permanently?")) return;
                await fetch(`${API_BASE}/api/notices/${id}`, {
                    method: "DELETE",
                });
                fetchNotices();
            }

            window.onload = () => {
                fetchNotices();
            };
        </script>
    </body>
</html>
