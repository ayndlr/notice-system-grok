<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NoticeBoard • Campus Hub</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        />
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");
            :root {
                --tw-color-primary: #00d4ff;
            }
            * {
                font-family: "Inter", system_ui, sans-serif;
            }
            .notice-card {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            }
            .notice-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 20px 40px -12px rgb(0 212 255 / 0.2);
            }
            .modal {
                animation: modalPop 0.3s ease forwards;
            }
            @keyframes modalPop {
                0% {
                    opacity: 0;
                    transform: scale(0.95);
                }
                100% {
                    opacity: 1;
                    transform: scale(1);
                }
            }
            .active-tab {
                border-bottom: 3px solid #00d4ff;
                color: #00d4ff;
                background-color: rgba(255, 255, 255, 0.05);
            }
            select option {
                background: #18181b;
                color: white;
            }
            .loading-spinner {
                border: 3px solid rgba(255, 255, 255, 0.1);
                border-radius: 50%;
                border-top: 3px solid #00d4ff;
                width: 24px;
                height: 24px;
                animation: spin 1s linear infinite;
            }
            @keyframes spin {
                0% {
                    transform: rotate(0deg);
                }
                100% {
                    transform: rotate(360deg);
                }
            }
        </style>
    </head>
    <body class="bg-zinc-950 text-white min-h-screen">
        <!-- HEADER -->
        <nav class="bg-zinc-900 border-b border-white/10 sticky top-0 z-50">
            <div
                class="max-w-screen-2xl mx-auto px-4 md:px-8 py-4 flex items-center justify-between gap-4"
            >
                <div class="flex items-center gap-x-3 shrink-0">
                    <div
                        class="w-10 h-10 bg-gradient-to-br from-cyan-400 to-blue-500 rounded-xl flex items-center justify-center text-xl"
                    >
                        📋
                    </div>
                    <h1
                        class="text-2xl font-bold tracking-tight hidden lg:block"
                    >
                        NoticeBoard
                    </h1>
                </div>

                <div class="flex-1 max-w-xl relative">
                    <i
                        class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-white/40"
                    ></i>
                    <input
                        id="searchInput"
                        type="text"
                        placeholder="Search notices..."
                        class="w-full bg-white/5 border border-white/10 focus:border-cyan-400 rounded-2xl py-3 pl-11 pr-4 text-white outline-none transition"
                    />
                </div>

                <div class="flex items-center gap-3">
                    <button
                        id="authBtn"
                        onclick="toggleAuth()"
                        class="px-4 py-2 rounded-xl border border-white/10 hover:bg-white/5 transition text-sm font-medium"
                    >
                        Login
                    </button>
                    <button
                        onclick="showCreateModal()"
                        class="bg-cyan-500 hover:bg-cyan-400 px-5 py-2.5 rounded-xl font-bold text-zinc-950 transition flex items-center gap-2"
                    >
                        <i class="fa-solid fa-plus"></i
                        ><span class="hidden sm:inline">Post</span>
                    </button>
                </div>
            </div>
        </nav>

        <main class="max-w-screen-2xl mx-auto px-4 md:px-8 py-8">
            <div class="flex flex-col md:flex-row gap-8">
                <!-- Sidebar -->
                <aside class="w-full md:w-64 space-y-6">
                    <div
                        class="bg-zinc-900/50 border border-white/10 rounded-2xl p-4"
                    >
                        <p
                            class="text-xs font-bold text-white/30 uppercase tracking-widest mb-4 px-2"
                        >
                            Categories
                        </p>
                        <nav class="space-y-1">
                            <button
                                onclick="filterByCategory('all')"
                                id="filter-all"
                                class="active-tab w-full flex items-center justify-between px-3 py-2.5 rounded-xl hover:bg-white/5 transition"
                            >
                                <span class="flex items-center gap-3"
                                    ><i
                                        class="fa-solid fa-layer-group text-cyan-400"
                                    ></i
                                    >All</span
                                >
                            </button>
                            <button
                                onclick="filterByCategory('urgent')"
                                id="filter-urgent"
                                class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl hover:bg-white/5 transition"
                            >
                                <span class="flex items-center gap-3"
                                    ><i
                                        class="fa-solid fa-circle-exclamation text-red-400"
                                    ></i
                                    >Urgent</span
                                >
                            </button>
                            <button
                                onclick="filterByCategory('events')"
                                id="filter-events"
                                class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl hover:bg-white/5 transition"
                            >
                                <span class="flex items-center gap-3"
                                    ><i
                                        class="fa-solid fa-calendar text-emerald-400"
                                    ></i
                                    >Events</span
                                >
                            </button>
                            <button
                                onclick="filterByCategory('academic')"
                                id="filter-academic"
                                class="w-full flex items-center justify-between px-3 py-2.5 rounded-xl hover:bg-white/5 transition"
                            >
                                <span class="flex items-center gap-3"
                                    ><i
                                        class="fa-solid fa-graduation-cap text-violet-400"
                                    ></i
                                    >Academic</span
                                >
                            </button>
                        </nav>
                    </div>
                </aside>

                <!-- Content Area -->
                <div class="flex-1">
                    <div class="flex items-end justify-between mb-8">
                        <div>
                            <h2 id="pageTitle" class="text-3xl font-bold">
                                Latest Notices
                            </h2>
                            <p class="text-white/40">
                                Official updates and campus news
                            </p>
                        </div>
                    </div>
                    <div
                        id="noticesGrid"
                        class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6"
                    >
                        <!-- Content loaded via JS -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Post/Edit Modal -->
        <div
            id="createModal"
            class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4"
        >
            <div
                class="modal bg-zinc-900 border border-white/10 rounded-3xl w-full max-w-xl overflow-hidden"
            >
                <div
                    class="p-6 border-b border-white/10 flex justify-between items-center"
                >
                    <h3 id="modalTitle" class="text-xl font-bold">
                        Post New Notice
                    </h3>
                    <button
                        onclick="hideCreateModal()"
                        class="text-white/40 hover:text-white"
                    >
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                </div>
                <form
                    id="noticeForm"
                    onsubmit="handleFormSubmit(event)"
                    class="p-6 space-y-4"
                >
                    <input type="hidden" id="editId" />
                    <div>
                        <label
                            class="text-xs font-bold text-white/40 uppercase mb-2 block"
                            >Author Name</label
                        >
                        <input
                            id="formAuthor"
                            required
                            placeholder="e.g. Registrar's Office"
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-cyan-400"
                        />
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2 sm:col-span-1">
                            <label
                                class="text-xs font-bold text-white/40 uppercase mb-2 block"
                                >Title</label
                            >
                            <input
                                id="formTitle"
                                required
                                placeholder="Notice title"
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-cyan-400"
                            />
                        </div>
                        <div class="col-span-2 sm:col-span-1">
                            <label
                                class="text-xs font-bold text-white/40 uppercase mb-2 block"
                                >Category</label
                            >
                            <select
                                id="formCategory"
                                class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-cyan-400"
                            >
                                <option value="urgent">Urgent</option>
                                <option value="events">Events</option>
                                <option value="academic">Academic</option>
                                <option value="general" selected>
                                    General
                                </option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label
                            class="text-xs font-bold text-white/40 uppercase mb-2 block"
                            >Content</label
                        >
                        <textarea
                            id="formContent"
                            required
                            rows="4"
                            placeholder="Description..."
                            class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-cyan-400 resize-none"
                        ></textarea>
                    </div>
                    <div>
                        <label
                            class="text-xs font-bold text-white/40 uppercase mb-2 block"
                            >Attachment (Max 5MB)</label
                        >
                        <input
                            type="file"
                            id="formFile"
                            accept="image/*,.pdf,.doc,.docx"
                            class="text-sm text-white/40 file:bg-white/10 file:text-white file:border-0 file:px-4 file:py-2 file:rounded-lg file:mr-4 file:cursor-pointer hover:file:bg-white/20"
                        />
                        <p
                            id="fileNameDisplay"
                            class="mt-2 text-cyan-400 text-xs hidden"
                        ></p>
                    </div>
                    <div class="pt-4 flex gap-3">
                        <button
                            type="button"
                            onclick="hideCreateModal()"
                            class="flex-1 py-3 border border-white/10 rounded-xl hover:bg-white/5 transition font-bold"
                        >
                            Cancel
                        </button>
                        <button
                            type="submit"
                            id="submitBtn"
                            class="flex-1 py-3 bg-cyan-500 text-zinc-950 rounded-xl hover:bg-cyan-400 transition font-bold flex items-center justify-center gap-2"
                        >
                            <span id="submitBtnText">Post Notice</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- View Modal -->
        <div
            id="viewModal"
            class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-center justify-center p-4"
        >
            <div
                class="modal bg-zinc-900 border border-white/10 rounded-3xl w-full max-w-2xl max-h-[90vh] overflow-y-auto"
            >
                <div id="viewContent" class="p-8"></div>
                <div class="p-8 pt-0 flex justify-end">
                    <button
                        onclick="hideViewModal()"
                        class="px-6 py-2 border border-white/10 rounded-xl hover:bg-white/5 transition"
                    >
                        Close
                    </button>
                </div>
            </div>
        </div>

        <!-- Login Modal -->
        <div
            id="loginModal"
            class="hidden fixed inset-0 bg-black/80 backdrop-blur-xl z-[200] flex items-center justify-center p-4"
        >
            <div
                class="bg-zinc-900 border border-white/10 rounded-3xl p-8 w-full max-w-md shadow-2xl modal"
            >
                <div class="text-center mb-8">
                    <div
                        class="w-16 h-16 bg-cyan-500/10 text-cyan-500 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4"
                    >
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <h3 class="text-2xl font-bold">Staff Login</h3>
                    <p class="text-white/40">
                        Enter credentials to manage board
                    </p>
                </div>
                <form
                    onsubmit="
                        event.preventDefault();
                        attemptLogin();
                    "
                    class="space-y-4"
                >
                    <input
                        id="loginUser"
                        type="text"
                        placeholder="Username"
                        required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 outline-none focus:border-cyan-400"
                    />
                    <input
                        id="loginPass"
                        type="password"
                        placeholder="Password"
                        required
                        class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 outline-none focus:border-cyan-400"
                    />
                    <button
                        type="submit"
                        id="loginSubmitBtn"
                        class="w-full py-4 bg-cyan-500 text-zinc-950 rounded-xl font-bold hover:bg-cyan-400 transition shadow-lg shadow-cyan-500/20 mt-2"
                    >
                        Login
                    </button>
                    <button
                        type="button"
                        onclick="hideLoginModal()"
                        class="w-full py-2 text-white/40 hover:text-white transition text-sm"
                    >
                        Dismiss
                    </button>
                </form>
            </div>
        </div>

        <script>
            // API Configuration
            const API_URL = "https://futi-noticeboard.netlify.app/";

            // State Management
            let notices = [];
            let isLoggedIn = false;
            let currentSearch = "";
            let currentCategory = "all";
            let activeAttachment = null;

            // Initialize
            window.onload = () => {
                if (localStorage.getItem("nb_auth") === "true") {
                    isLoggedIn = true;
                    document.getElementById("authBtn").textContent = "Logout";
                }
                fetchNotices();
            };

            // Search Logic
            document
                .getElementById("searchInput")
                .addEventListener("input", (e) => {
                    currentSearch = e.target.value.toLowerCase();
                    renderNotices();
                });

            async function fetchNotices() {
                const grid = document.getElementById("noticesGrid");
                grid.innerHTML = `<div class="col-span-full text-center py-20"><div class="loading-spinner mx-auto mb-4"></div><p class="text-white/40">Loading notices...</p></div>`;

                try {
                    const res = await fetch(`${API_URL}/notices`);
                    notices = await res.json();
                    renderNotices();
                } catch (err) {
                    grid.innerHTML = `<div class="col-span-full text-center py-20 text-red-400"><i class="fa-solid fa-circle-exclamation text-4xl mb-2"></i><p>Failed to load notices. Ensure server is running.</p></div>`;
                }
            }

            function renderNotices() {
                const grid = document.getElementById("noticesGrid");
                grid.innerHTML = "";

                let filtered = notices.filter((n) => {
                    const matchesSearch =
                        n.title.toLowerCase().includes(currentSearch) ||
                        n.author.toLowerCase().includes(currentSearch) ||
                        n.content.toLowerCase().includes(currentSearch);
                    const matchesCat =
                        currentCategory === "all" ||
                        n.category === currentCategory;
                    return matchesSearch && matchesCat;
                });

                if (filtered.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center py-20 text-white/20"><i class="fa-solid fa-folder-open text-6xl mb-4"></i><p>No notices found</p></div>`;
                    return;
                }

                filtered.forEach((notice) => {
                    const hasAttachment =
                        notice.attachment && notice.attachment.data;
                    const card = document.createElement("div");
                    card.className =
                        "notice-card bg-zinc-900 border border-white/10 rounded-2xl p-6 cursor-pointer relative group flex flex-col";
                    card.onclick = () => viewNotice(notice._id);

                    card.innerHTML = `
                        <div class="flex items-center justify-between mb-4">
                            <span class="text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded bg-white/10 ${getCatColor(notice.category)}">${notice.category}</span>
                            ${
                                isLoggedIn
                                    ? `
                            <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition">
                                <button onclick="event.stopPropagation(); editNotice('${notice._id}')" class="p-2 text-white/40 hover:text-cyan-400 transition" title="Edit"><i class="fa-solid fa-pen-to-square"></i></button>
                                <button onclick="event.stopPropagation(); deleteNotice('${notice._id}')" class="p-2 text-white/40 hover:text-red-400 transition" title="Delete"><i class="fa-solid fa-trash"></i></button>
                            </div>`
                                    : ""
                            }
                        </div>
                        <h3 class="text-xl font-bold mb-2 group-hover:text-cyan-400 transition line-clamp-2">${notice.title}</h3>
                        <p class="text-white/50 text-sm mb-4 line-clamp-3 leading-relaxed flex-grow">${notice.content}</p>
                        ${hasAttachment ? `<div class="mb-4 text-xs font-bold text-cyan-400/60 flex items-center gap-1"><i class="fa-solid fa-paperclip"></i> Attachment</div>` : ""}
                        <div class="pt-4 border-t border-white/5 flex items-center justify-between text-[11px] text-white/30 font-medium">
                            <span class="flex items-center gap-1.5"><i class="fa-solid fa-user-circle text-white/20"></i> ${notice.author}</span>
                            <span>${new Date(notice.date).toLocaleDateString()}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }

            function getCatColor(cat) {
                switch (cat) {
                    case "urgent":
                        return "text-red-400";
                    case "events":
                        return "text-emerald-400";
                    case "academic":
                        return "text-violet-400";
                    default:
                        return "text-cyan-400";
                }
            }

            // File Handling
            document
                .getElementById("formFile")
                .addEventListener("change", function (e) {
                    const file = e.target.files[0];
                    if (!file) return;

                    if (file.size > 5 * 1024 * 1024) {
                        alert("File is too large (Max 5MB)");
                        this.value = "";
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = function () {
                        activeAttachment = {
                            data: reader.result,
                            name: file.name,
                            type: file.type,
                        };
                        document.getElementById("fileNameDisplay").textContent =
                            `✓ Attached: ${file.name}`;
                        document
                            .getElementById("fileNameDisplay")
                            .classList.remove("hidden");
                    };
                    reader.readAsDataURL(file);
                });

            async function handleFormSubmit(e) {
                e.preventDefault();
                const id = document.getElementById("editId").value;
                const submitBtn = document.getElementById("submitBtn");
                const btnText = document.getElementById("submitBtnText");

                const payload = {
                    title: document.getElementById("formTitle").value,
                    author: document.getElementById("formAuthor").value,
                    category: document.getElementById("formCategory").value,
                    content: document.getElementById("formContent").value,
                    attachment: activeAttachment,
                };

                btnText.innerHTML = `<div class="loading-spinner"></div>`;
                submitBtn.disabled = true;

                try {
                    let res;
                    if (id) {
                        res = await fetch(`${API_URL}/notices/${id}`, {
                            method: "PUT",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload),
                        });
                    } else {
                        res = await fetch(`${API_URL}/notices`, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify(payload),
                        });
                    }

                    if (res.ok) {
                        hideCreateModal();
                        fetchNotices();
                    } else {
                        alert("Error saving notice.");
                    }
                } catch (err) {
                    alert("Network error. Is the backend running?");
                } finally {
                    btnText.textContent = id ? "Save Changes" : "Post Notice";
                    submitBtn.disabled = false;
                }
            }

            function showCreateModal() {
                if (!isLoggedIn) {
                    showLogin();
                    return;
                }
                document.getElementById("noticeForm").reset();
                document.getElementById("editId").value = "";
                document.getElementById("modalTitle").textContent =
                    "Post New Notice";
                document.getElementById("submitBtnText").textContent =
                    "Post Notice";
                document
                    .getElementById("fileNameDisplay")
                    .classList.add("hidden");
                activeAttachment = null;
                document
                    .getElementById("createModal")
                    .classList.remove("hidden");
                document.getElementById("createModal").classList.add("flex");
            }

            function hideCreateModal() {
                document.getElementById("createModal").classList.add("hidden");
                document.getElementById("createModal").classList.remove("flex");
            }

            function editNotice(id) {
                const notice = notices.find((n) => n._id === id);
                if (!notice) return;

                document.getElementById("editId").value = id;
                document.getElementById("formTitle").value = notice.title;
                document.getElementById("formAuthor").value = notice.author;
                document.getElementById("formCategory").value = notice.category;
                document.getElementById("formContent").value = notice.content;

                activeAttachment = notice.attachment || null;
                if (activeAttachment) {
                    document.getElementById("fileNameDisplay").textContent =
                        `Current: ${activeAttachment.name}`;
                    document
                        .getElementById("fileNameDisplay")
                        .classList.remove("hidden");
                } else {
                    document
                        .getElementById("fileNameDisplay")
                        .classList.add("hidden");
                }

                document.getElementById("modalTitle").textContent =
                    "Edit Notice";
                document.getElementById("submitBtnText").textContent =
                    "Save Changes";
                document
                    .getElementById("createModal")
                    .classList.remove("hidden");
                document.getElementById("createModal").classList.add("flex");
            }

            async function deleteNotice(id) {
                if (!confirm("Delete this notice forever?")) return;

                try {
                    const res = await fetch(`${API_URL}/notices/${id}`, {
                        method: "DELETE",
                    });
                    if (res.ok) fetchNotices();
                    else alert("Failed to delete.");
                } catch (err) {
                    alert("Error connecting to server.");
                }
            }

            function viewNotice(id) {
                const n = notices.find((notice) => notice._id === id);
                if (!n) return;

                let attachHtml = "";
                if (n.attachment && n.attachment.data) {
                    if (n.attachment.type.startsWith("image/")) {
                        attachHtml = `<div class="mt-8 rounded-2xl overflow-hidden border border-white/10 shadow-2xl"><img src="${n.attachment.data}" class="w-full h-auto" /></div>`;
                    } else {
                        attachHtml = `
                            <div class="mt-8 p-4 bg-white/5 rounded-xl border border-white/10 flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <i class="fa-solid fa-file-lines text-2xl text-cyan-400"></i>
                                    <div><p class="font-bold text-sm">${n.attachment.name}</p><p class="text-xs text-white/30">Document Attachment</p></div>
                                </div>
                                <a href="${n.attachment.data}" download="${n.attachment.name}" class="p-2 bg-cyan-500 text-zinc-950 rounded-lg hover:bg-cyan-400"><i class="fa-solid fa-download"></i></a>
                            </div>
                        `;
                    }
                }

                document.getElementById("viewContent").innerHTML = `
                    <div class="flex items-center gap-2 mb-4">
                         <span class="text-[10px] font-black uppercase tracking-widest px-2 py-1 rounded bg-white/10 ${getCatColor(n.category)}">${n.category}</span>
                    </div>
                    <h2 class="text-3xl font-black mb-2 leading-tight">${n.title}</h2>
                    <div class="flex items-center gap-4 text-xs text-white/40 mb-8 pb-8 border-b border-white/5">
                        <span class="flex items-center gap-1.5"><i class="fa-solid fa-user"></i> By ${n.author}</span>
                        <span>•</span>
                        <span><i class="fa-solid fa-clock"></i> ${new Date(n.date).toLocaleString()}</span>
                    </div>
                    <div class="text-white/70 leading-loose text-lg whitespace-pre-wrap">${n.content}</div>
                    ${attachHtml}
                `;
                document.getElementById("viewModal").classList.remove("hidden");
                document.getElementById("viewModal").classList.add("flex");
            }

            function hideViewModal() {
                document.getElementById("viewModal").classList.add("hidden");
                document.getElementById("viewModal").classList.remove("flex");
            }

            // Auth Logic
            function showLogin() {
                document
                    .getElementById("loginModal")
                    .classList.remove("hidden");
                document.getElementById("loginModal").classList.add("flex");
                document.getElementById("loginUser").value = "";
                document.getElementById("loginPass").value = "";
            }

            function hideLoginModal() {
                document.getElementById("loginModal").classList.add("hidden");
                document.getElementById("loginModal").classList.remove("flex");
            }

            async function attemptLogin() {
                const username = document.getElementById("loginUser").value;
                const password = document.getElementById("loginPass").value;
                const btn = document.getElementById("loginSubmitBtn");

                try {
                    const res = await fetch(`${API_URL}/login`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ username, password }),
                    });
                    const data = await res.json();

                    if (data.success) {
                        isLoggedIn = true;
                        localStorage.setItem("nb_auth", "true");
                        hideLoginModal();
                        document.getElementById("authBtn").textContent =
                            "Logout";
                        renderNotices();
                    } else {
                        btn.textContent = "Invalid Credentials";
                        btn.classList.replace("bg-cyan-500", "bg-red-500");
                        setTimeout(() => {
                            btn.textContent = "Login";
                            btn.classList.replace("bg-red-500", "bg-cyan-500");
                        }, 2000);
                    }
                } catch (err) {
                    alert("Could not connect to auth server.");
                }
            }

            function toggleAuth() {
                if (isLoggedIn) {
                    isLoggedIn = false;
                    localStorage.removeItem("nb_auth");
                    document.getElementById("authBtn").textContent = "Login";
                    renderNotices();
                } else {
                    showLogin();
                }
            }

            function filterByCategory(cat) {
                currentCategory = cat;
                document.querySelectorAll('[id^="filter-"]').forEach((el) => {
                    el.classList.remove("active-tab");
                });
                document
                    .getElementById(`filter-${cat}`)
                    .classList.add("active-tab");

                const titles = {
                    all: "Latest Notices",
                    urgent: "Urgent Announcements",
                    events: "Upcoming Events",
                    academic: "Academic Updates",
                };
                document.getElementById("pageTitle").textContent =
                    titles[cat] || "Notices";
                renderNotices();
            }
        </script>
    </body>
</html>
