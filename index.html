<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoticeBoard • Campus Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");
        * { font-family: "Inter", sans-serif; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #09090b; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        .notice-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(255,255,255,0.05); }
        .notice-card:hover { transform: translateY(-4px); border-color: rgba(0, 212, 255, 0.3); box-shadow: 0 20px 40px -12px rgba(0, 212, 255, 0.15); }
        .active-filter { background: rgba(0, 212, 255, 0.1); color: #22d3ee; border-left: 3px solid #22d3ee; }
        .glass { background: rgba(24, 24, 27, 0.7); backdrop-filter: blur(12px); }
        .modal-container { max-height: 90vh; overflow-y: auto; }
        .skeleton { background: linear-gradient(90deg, #18181b 25%, #27272a 50%, #18181b 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { from { background-position: 200% 0; } to { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-[#09090b] text-zinc-100 min-h-screen">

    <nav class="sticky top-0 z-[100] glass border-b border-white/5 px-4 md:px-8 py-4">
        <div class="max-w-[1600px] mx-auto flex items-center justify-between gap-6">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center shadow-lg shadow-cyan-500/20">
                    <i class="fa-solid fa-clipboard-list text-zinc-900 text-xl"></i>
                </div>
                <h1 class="text-xl font-bold hidden sm:block">NoticeBoard</h1>
            </div>

            <div class="flex-1 max-w-2xl relative group">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 group-focus-within:text-cyan-400 transition-colors"></i>
                <input type="text" id="searchInput" placeholder="Search notices, titles, or authors..."
                    class="w-full bg-zinc-900/50 border border-white/10 rounded-2xl py-3 pl-12 pr-4 outline-none focus:ring-2 focus:ring-cyan-500/30 transition-all">
            </div>

            <div class="flex items-center gap-4">
                <button onclick="toggleAuth()" id="authBtn" class="text-sm font-medium hover:text-cyan-400 transition">Login</button>
                <button onclick="openPostModal()" id="postBtn" class="hidden bg-cyan-500 hover:bg-cyan-400 text-zinc-900 px-5 py-2.5 rounded-xl font-bold transition flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> <span class="hidden md:inline">Post Notice</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-[1600px] mx-auto px-4 md:px-8 py-8 flex flex-col md:flex-row gap-8">

        <aside class="w-full md:w-72 shrink-0 space-y-8">
            <div>
                <p class="text-[11px] font-bold text-zinc-500 uppercase tracking-[0.2em] mb-4 ml-2">Filters</p>
                <nav class="space-y-1">
                    <button onclick="applyFilter('all')" id="nav-all" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition active-filter">
                        <i class="fa-solid fa-house"></i> Dashboard
                    </button>
                    <button onclick="filterMyNotices()" id="nav-my" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition hidden">
                        <i class="fa-solid fa-user-pen"></i> My Posts
                    </button>
                </nav>
            </div>

            <div>
                <p class="text-[11px] font-bold text-zinc-500 uppercase tracking-[0.2em] mb-4 ml-2">Categories</p>
                <nav class="space-y-1">
                    <button onclick="applyFilter('urgent')" id="nav-urgent" class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-white/5 transition group">
                        <span class="flex items-center gap-3"><i class="fa-solid fa-circle-exclamation text-red-400"></i> Urgent</span>
                        <span class="text-[10px] bg-red-400/10 text-red-400 px-2 py-0.5 rounded-full count" data-cat="urgent">0</span>
                    </button>
                    <button onclick="applyFilter('events')" id="nav-events" class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-white/5 transition group">
                        <span class="flex items-center gap-3"><i class="fa-solid fa-calendar text-emerald-400"></i> Events</span>
                        <span class="text-[10px] bg-emerald-400/10 text-emerald-400 px-2 py-0.5 rounded-full count" data-cat="events">0</span>
                    </button>
                    <button onclick="applyFilter('academic')" id="nav-academic" class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-white/5 transition group">
                        <span class="flex items-center gap-3"><i class="fa-solid fa-graduation-cap text-violet-400"></i> Academic</span>
                        <span class="text-[10px] bg-violet-400/10 text-violet-400 px-2 py-0.5 rounded-full count" data-cat="academic">0</span>
                    </button>
                    <button onclick="applyFilter('administrative')" id="nav-administrative" class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-white/5 transition group">
                        <span class="flex items-center gap-3"><i class="fa-solid fa-building-columns text-amber-400"></i> Admin</span>
                        <span class="text-[10px] bg-amber-400/10 text-amber-400 px-2 py-0.5 rounded-full count" data-cat="administrative">0</span>
                    </button>
                </nav>
            </div>
        </aside>

        <main class="flex-1">
            <div class="mb-8">
                <h2 id="mainHeading" class="text-3xl font-bold text-white mb-2">Latest Notices</h2>
                <p class="text-zinc-500 text-sm">Real-time campus updates and announcements</p>
            </div>
            <div id="noticesGrid" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Skeletons -->
                <div class="skeleton h-64 rounded-3xl"></div>
                <div class="skeleton h-64 rounded-3xl"></div>
            </div>
        </main>
    </div>

    <!-- MODALS -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[200] hidden flex items-center justify-center p-4">

        <!-- Post/Edit -->
        <div id="postModal" class="bg-zinc-900 border border-white/10 rounded-3xl w-full max-w-2xl hidden modal-container">
            <div class="p-6 border-b border-white/5 flex justify-between items-center bg-white/5">
                <h3 id="pModalTitle" class="text-xl font-bold">New Announcement</h3>
                <button onclick="closeModals()" class="text-zinc-500 hover:text-white"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="p-8 space-y-5">
                <input type="hidden" id="editId">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">Title</label>
                        <input type="text" id="pTitle" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-cyan-500">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">Category</label>
                        <select id="pCat" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white">
                            <option value="urgent">Urgent</option>
                            <option value="events">Events</option>
                            <option value="academic">Academic</option>
                            <option value="administrative">Administrative</option>
                        </select>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">Message Content</label>
                    <textarea id="pContent" rows="5" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 resize-none outline-none focus:border-cyan-500"></textarea>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">Author Display</label>
                        <input type="text" id="pAuthor" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">Attachment</label>
                        <input type="file" id="pFile" class="hidden" onchange="handleFile(event)">
                        <label for="pFile" class="w-full bg-cyan-500/5 border border-dashed border-cyan-500/20 rounded-xl px-4 py-3 flex items-center justify-between cursor-pointer">
                            <span id="pFileName" class="text-zinc-500 text-xs truncate">Click to add file</span>
                            <i class="fa-solid fa-paperclip text-cyan-500"></i>
                        </label>
                    </div>
                </div>
                <button onclick="submitNotice()" id="pBtn" class="w-full bg-cyan-500 text-zinc-900 font-bold py-4 rounded-xl shadow-lg shadow-cyan-500/20 transition">Publish Now</button>
            </div>
        </div>

        <!-- Detail View -->
        <div id="viewModal" class="bg-zinc-900 border border-white/10 rounded-3xl w-full max-w-2xl hidden modal-container relative">
            <button onclick="closeModals()" class="absolute top-6 right-6 text-zinc-500 hover:text-white z-10"><i class="fa-solid fa-xmark text-xl"></i></button>
            <div id="viewArea" class="p-8 md:p-12"></div>
        </div>

        <!-- Login -->
        <div id="loginModal" class="bg-zinc-900 border border-white/10 rounded-3xl p-8 w-full max-w-sm hidden">
            <div class="text-center mb-6">
                <i class="fa-solid fa-lock text-cyan-500 text-3xl mb-4"></i>
                <h3 class="text-xl font-bold">Admin Login</h3>
            </div>
            <div class="space-y-4">
                <input type="text" id="lUser" placeholder="Username" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-cyan-500">
                <input type="password" id="lPass" placeholder="Password" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 outline-none focus:border-cyan-500">
                <button onclick="handleLogin()" id="lBtn" class="w-full bg-cyan-500 text-zinc-900 font-bold py-3 rounded-xl shadow-lg">Enter Dashboard</button>
                <button onclick="closeModals()" class="w-full text-zinc-500 text-xs py-2">Back to board</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://futi-noticeboard.onrender.com/api";
        let allNotices = [];
        let currentFilter = "all";
        let isLoggedIn = localStorage.getItem("nb_auth") === "true";
        let tempAttachment = null;

        window.onload = () => {
            updateAuthUI();
            fetchNotices();
            // Clear inputs
            document.getElementById("searchInput").value = "";
            document.getElementById("lUser").value = "";
            document.getElementById("lPass").value = "";
        };

        async function fetchNotices() {
            try {
                const res = await fetch(`${API_URL}/notices`);
                allNotices = await res.json();
                updateCounts();
                applyFilter(currentFilter);
            } catch (err) {
                document.getElementById("noticesGrid").innerHTML = `<p class="text-red-400">Server unreachable.</p>`;
            }
        }

        function updateCounts() {
            const categories = ['urgent', 'events', 'academic', 'administrative'];
            categories.forEach(cat => {
                const count = allNotices.filter(n => n.category === cat).length;
                const el = document.querySelector(`.count[data-cat="${cat}"]`);
                if(el) el.innerText = count;
            });
        }

        function renderGrid(data) {
            const grid = document.getElementById("noticesGrid");
            if (!data.length) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-zinc-600">No notices found.</div>`;
                return;
            }

            grid.innerHTML = data.map(n => `
                <div class="notice-card bg-zinc-900/40 rounded-3xl p-6 flex flex-col cursor-pointer" onclick="viewNoticeDetail('${n._id}')">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black uppercase px-2 py-1 bg-zinc-800 rounded ${getCatColor(n.category)}">${n.category}</span>
                        ${isLoggedIn ? `
                            <div class="flex gap-2">
                                <button onclick="event.stopPropagation(); openEditModal('${n._id}')" class="w-8 h-8 rounded-lg hover:bg-white/5 text-zinc-500 hover:text-cyan-400 flex items-center justify-center"><i class="fa-solid fa-pen text-xs"></i></button>
                                <button onclick="event.stopPropagation(); deleteNotice('${n._id}')" class="w-8 h-8 rounded-lg hover:bg-white/5 text-zinc-500 hover:text-red-400 flex items-center justify-center"><i class="fa-solid fa-trash text-xs"></i></button>
                            </div>
                        ` : ''}
                    </div>
                    <h3 class="text-xl font-bold mb-2 line-clamp-2">${n.title}</h3>
                    <p class="text-zinc-500 text-sm line-clamp-3 mb-6">${n.content}</p>
                    <div class="mt-auto pt-4 border-t border-white/5 flex justify-between items-center text-[10px] font-bold text-zinc-500 uppercase tracking-widest">
                        <span>${n.author}</span>
                        <span>${new Date(n.date).toLocaleDateString()}</span>
                    </div>
                </div>
            `).join('');
        }

        function getCatColor(cat) {
            const colors = { urgent: 'text-red-400', events: 'text-emerald-400', academic: 'text-violet-400', administrative: 'text-amber-400' };
            return colors[cat] || 'text-cyan-400';
        }

        // FILTER LOGIC
        function applyFilter(cat) {
            currentFilter = cat;
            document.querySelectorAll('aside nav button').forEach(b => b.classList.remove('active-filter'));
            const target = document.getElementById(`nav-${cat}`);
            if(target) target.classList.add('active-filter');

            document.getElementById("mainHeading").innerText = cat === 'all' ? 'Latest Notices' : cat.charAt(0).toUpperCase() + cat.slice(1);

            const filtered = cat === 'all' ? allNotices : allNotices.filter(n => n.category === cat);
            renderGrid(filtered);
        }

        function filterMyNotices() {
            currentFilter = "my";
            document.querySelectorAll('aside nav button').forEach(b => b.classList.remove('active-filter'));
            document.getElementById("nav-my").classList.add("active-filter");
            const my = allNotices.filter(n => n.author.toLowerCase().includes("admin") || n.author.toLowerCase().includes("stickz"));
            renderGrid(my);
        }

        // SEARCH
        document.getElementById("searchInput").addEventListener("input", (e) => {
            const q = e.target.value.toLowerCase();
            const results = allNotices.filter(n =>
                n.title.toLowerCase().includes(q) ||
                n.content.toLowerCase().includes(q) ||
                n.author.toLowerCase().includes(q)
            );
            renderGrid(results);
        });

        // CRUD
        function openPostModal() {
            document.getElementById("editId").value = "";
            document.getElementById("pModalTitle").innerText = "New Announcement";
            document.getElementById("pTitle").value = "";
            document.getElementById("pContent").value = "";
            document.getElementById("pAuthor").value = "Master Admin";
            document.getElementById("pFileName").innerText = "Click to add file";
            tempAttachment = null;
            showModal("postModal");
        }

        function openEditModal(id) {
            const n = allNotices.find(x => x._id === id);
            document.getElementById("editId").value = n._id;
            document.getElementById("pModalTitle").innerText = "Edit Announcement";
            document.getElementById("pTitle").value = n.title;
            document.getElementById("pCat").value = n.category;
            document.getElementById("pContent").value = n.content;
            document.getElementById("pAuthor").value = n.author;
            document.getElementById("pFileName").innerText = n.attachment ? n.attachment.name : "Click to add file";
            tempAttachment = n.attachment;
            showModal("postModal");
        }

        async function submitNotice() {
            const id = document.getElementById("editId").value;
            const btn = document.getElementById("pBtn");
            const data = {
                title: document.getElementById("pTitle").value,
                category: document.getElementById("pCat").value,
                content: document.getElementById("pContent").value,
                author: document.getElementById("pAuthor").value,
                attachment: tempAttachment
            };

            if(!data.title || !data.content) return alert("Fill in title and content.");

            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-2"></i> Syncing...`;

            try {
                const method = id ? 'PUT' : 'POST';
                const url = id ? `${API_URL}/notices/${id}` : `${API_URL}/notices`;
                await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                await fetchNotices();
                closeModals();
            } catch (err) {
                alert("Upload failed. Server limit exceeded?");
            } finally {
                btn.disabled = false;
                btn.innerText = "Publish Now";
            }
        }

        async function deleteNotice(id) {
            if (confirm("Permanently delete?")) {
                await fetch(`${API_URL}/notices/${id}`, { method: 'DELETE' });
                fetchNotices();
            }
        }

        function viewNoticeDetail(id) {
            const n = allNotices.find(x => x._id === id);
            const area = document.getElementById("viewArea");
            area.innerHTML = `
                <span class="text-xs font-black uppercase text-cyan-500 mb-2 block">${n.category}</span>
                <h2 class="text-3xl font-bold mb-4">${n.title}</h2>
                <p class="text-sm text-zinc-500 mb-8 border-b border-white/5 pb-4">${n.author} • ${new Date(n.date).toLocaleDateString()}</p>
                <div class="text-zinc-300 leading-relaxed whitespace-pre-wrap mb-10 text-lg">${n.content}</div>
                ${n.attachment ? `
                    <div class="bg-white/5 border border-white/10 rounded-2xl p-6 flex flex-col md:flex-row items-center justify-between gap-4">
                        <div class="flex items-center gap-4">
                            <i class="fa-solid fa-file-invoice text-3xl text-cyan-500"></i>
                            <div>
                                <p class="text-sm font-bold text-white">${n.attachment.name}</p>
                                <p class="text-[10px] text-zinc-500 uppercase tracking-widest">Official Attachment</p>
                            </div>
                        </div>
                        <button onclick="downloadFile('${n.attachment.data}', '${n.attachment.name}')"
                                class="w-full md:w-auto bg-cyan-500 text-zinc-900 px-8 py-3 rounded-xl font-bold hover:bg-cyan-400 transition">
                            Download Attachment
                        </button>
                    </div>
                ` : ''}
            `;
            showModal("viewModal");
        }

        // BINARY UTILS
        function handleFile(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = () => {
                tempAttachment = {
                    data: reader.result,
                    name: file.name,
                    type: file.type
                };
                document.getElementById("pFileName").innerText = file.name;
            };
            reader.readAsDataURL(file);
        }

        function downloadFile(base64, name) {
            const link = document.createElement("a");
            link.href = base64;
            link.download = name;
            link.click();
        }

        // AUTH
        async function handleLogin() {
            const user = document.getElementById("lUser").value;
            const pass = document.getElementById("lPass").value;
            const btn = document.getElementById("lBtn");
            btn.disabled = true;
            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();
                if (res.ok) {
                    isLoggedIn = true;
                    localStorage.setItem("nb_auth", "true");
                    updateAuthUI();
                    closeModals();
                    fetchNotices();
                } else {
                    alert("Invalid Login");
                }
            } catch (err) { alert("Login failed"); } finally { btn.disabled = false; }
        }

        function toggleAuth() {
            if (isLoggedIn) {
                isLoggedIn = false;
                localStorage.removeItem("nb_auth");
                updateAuthUI();
                fetchNotices();
            } else {
                showModal("loginModal");
            }
        }

        function updateAuthUI() {
            document.getElementById("postBtn").classList.toggle("hidden", !isLoggedIn);
            document.getElementById("nav-my").classList.toggle("hidden", !isLoggedIn);
            document.getElementById("authBtn").textContent = isLoggedIn ? "Logout" : "Login";
        }

        function showModal(id) {
            document.getElementById("modalOverlay").classList.remove("hidden");
            document.querySelectorAll("#modalOverlay > div").forEach(d => d.classList.add("hidden"));
            document.getElementById(id).classList.remove("hidden");
            document.body.style.overflow = "hidden";
        }

        function closeModals() {
            document.getElementById("modalOverlay").classList.add("hidden");
            document.body.style.overflow = "auto";
        }
    </script>
</body>
</html>
