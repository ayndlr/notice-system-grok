<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NoticeBoard • Campus Hub</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        />
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");
            * {
                font-family: "Inter", sans-serif;
            }
            ::-webkit-scrollbar {
                width: 6px;
            }
            ::-webkit-scrollbar-track {
                background: #09090b;
            }
            ::-webkit-scrollbar-thumb {
                background: #27272a;
                border-radius: 10px;
            }
            .notice-card {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                border: 1px solid rgba(255, 255, 255, 0.05);
                cursor: pointer;
            }
            .notice-card:hover {
                transform: translateY(-4px);
                border-color: rgba(0, 212, 255, 0.3);
                box-shadow: 0 20px 40px -12px rgba(0, 212, 255, 0.15);
            }
            .active-filter {
                background: rgba(0, 212, 255, 0.1);
                color: #22d3ee;
                border-left: 3px solid #22d3ee;
            }
            .glass {
                background: rgba(24, 24, 27, 0.7);
                backdrop-filter: blur(12px);
            }
            .modal-container {
                max-height: 90vh;
                overflow-y: auto;
            }
        </style>
    </head>
    <body class="bg-[#09090b] text-zinc-100 min-h-screen">
        <nav
            class="sticky top-0 z-[100] glass border-b border-white/5 px-4 md:px-8 py-4"
        >
            <div
                class="max-w-[1600px] mx-auto flex items-center justify-between gap-6"
            >
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center"
                    >
                        <i
                            class="fa-solid fa-clipboard-list text-zinc-900 text-xl"
                        ></i>
                    </div>
                    <h1 class="text-xl font-bold hidden sm:block">
                        NoticeBoard
                    </h1>
                </div>

                <div class="flex-1 max-w-2xl relative">
                    <i
                        class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500"
                    ></i>
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="Search notices..."
                        class="w-full bg-zinc-900 border border-white/10 rounded-2xl py-3 pl-12 pr-4 outline-none focus:ring-2 focus:ring-cyan-500/30"
                    />
                </div>

                <div class="flex items-center gap-4">
                    <button
                        onclick="toggleAuth()"
                        id="authBtn"
                        class="text-sm font-medium hover:text-cyan-400"
                    >
                        Login
                    </button>
                    <button
                        onclick="openPostModal()"
                        id="postBtn"
                        class="hidden bg-cyan-500 hover:bg-cyan-400 text-zinc-900 px-5 py-2.5 rounded-xl font-bold flex items-center gap-2"
                    >
                        <i class="fa-solid fa-plus"></i>
                        <span class="hidden md:inline">Post</span>
                    </button>
                </div>
            </div>
        </nav>

        <div
            class="max-w-[1600px] mx-auto px-4 md:px-8 py-8 flex flex-col md:flex-row gap-8"
        >
            <aside class="w-full md:w-72 shrink-0 space-y-6">
                <nav class="space-y-1">
                    <button
                        onclick="filterByCategory('all')"
                        id="nav-all"
                        class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 active-filter"
                    >
                        <i class="fa-solid fa-house"></i> Dashboard
                    </button>
                    <button
                        onclick="filterByCategory('urgent')"
                        id="nav-urgent"
                        class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-white/5"
                    >
                        <span class="flex items-center gap-3"
                            ><i
                                class="fa-solid fa-circle-exclamation text-red-400"
                            ></i>
                            Urgent</span
                        >
                        <span class="text-xs opacity-50 count" data-cat="urgent"
                            >0</span
                        >
                    </button>
                    <button
                        onclick="filterByCategory('events')"
                        id="nav-events"
                        class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-white/5"
                    >
                        <span class="flex items-center gap-3"
                            ><i
                                class="fa-solid fa-calendar text-emerald-400"
                            ></i>
                            Events</span
                        >
                        <span class="text-xs opacity-50 count" data-cat="events"
                            >0</span
                        >
                    </button>
                    <button
                        onclick="filterByCategory('academic')"
                        id="nav-academic"
                        class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-white/5"
                    >
                        <span class="flex items-center gap-3"
                            ><i
                                class="fa-solid fa-graduation-cap text-violet-400"
                            ></i>
                            Academic</span
                        >
                        <span
                            class="text-xs opacity-50 count"
                            data-cat="academic"
                            >0</span
                        >
                    </button>
                </nav>
            </aside>

            <main class="flex-1">
                <h2 id="mainHeading" class="text-3xl font-bold mb-8">
                    Latest Notices
                </h2>
                <div
                    id="noticesGrid"
                    class="grid grid-cols-1 lg:grid-cols-2 gap-6"
                ></div>
            </main>
        </div>

        <!-- MODAL OVERLAY -->
        <div
            id="modalOverlay"
            class="fixed inset-0 bg-black/90 backdrop-blur-md z-[200] hidden flex items-center justify-center p-4"
        >
            <!-- Login Modal -->
            <div
                id="loginModal"
                class="bg-zinc-900 border border-white/10 rounded-3xl p-8 w-full max-w-md hidden"
            >
                <h3 class="text-2xl font-bold mb-6 text-center">
                    Admin Portal
                </h3>
                <div class="space-y-4">
                    <input
                        type="text"
                        id="lUser"
                        placeholder="Username"
                        class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3"
                    />
                    <input
                        type="password"
                        id="lPass"
                        placeholder="Password"
                        class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3"
                    />
                    <button
                        onclick="handleLogin()"
                        id="lBtn"
                        class="w-full bg-cyan-500 text-zinc-900 font-bold py-3 rounded-xl mt-4"
                    >
                        Login
                    </button>
                    <button
                        onclick="closeModals()"
                        class="w-full text-zinc-500 text-sm"
                    >
                        Cancel
                    </button>
                </div>
            </div>

            <!-- Post/Edit Modal -->
            <div
                id="postModal"
                class="bg-zinc-900 border border-white/10 rounded-3xl w-full max-w-2xl hidden modal-container"
            >
                <div
                    class="p-6 border-b border-white/5 flex justify-between items-center"
                >
                    <h3 id="pModalTitle" class="text-xl font-bold">
                        New Notice
                    </h3>
                    <button
                        onclick="closeModals()"
                        class="text-zinc-500 hover:text-white"
                    >
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
                <div class="p-6 space-y-4">
                    <input type="hidden" id="editId" />
                    <input
                        type="text"
                        id="pTitle"
                        placeholder="Notice Title"
                        class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3"
                    />
                    <select
                        id="pCat"
                        class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white"
                    >
                        <option value="urgent">Urgent</option>
                        <option value="events">Events</option>
                        <option value="academic">Academic</option>
                        <option value="administrative" selected>
                            Administrative
                        </option>
                    </select>
                    <textarea
                        id="pContent"
                        rows="5"
                        placeholder="Description..."
                        class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 resize-none"
                    ></textarea>
                    <input
                        type="text"
                        id="pAuthor"
                        placeholder="Author"
                        class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3"
                    />

                    <div class="space-y-2">
                        <label
                            class="text-xs font-bold text-zinc-500 uppercase ml-1"
                            >Attachment</label
                        >
                        <input
                            type="file"
                            id="pFile"
                            class="hidden"
                            onchange="handleFile(event)"
                        />
                        <label
                            for="pFile"
                            class="w-full bg-cyan-500/5 border border-dashed border-cyan-500/30 rounded-xl p-4 flex items-center justify-between cursor-pointer hover:bg-cyan-500/10"
                        >
                            <span
                                id="pFileName"
                                class="text-zinc-400 text-sm truncate"
                                >Click to upload doc/image</span
                            >
                            <i class="fa-solid fa-paperclip text-cyan-500"></i>
                        </label>
                    </div>

                    <button
                        onclick="submitNotice()"
                        id="pBtn"
                        class="w-full bg-cyan-500 text-zinc-900 font-bold py-4 rounded-xl shadow-lg"
                    >
                        Publish Notice
                    </button>
                </div>
            </div>

            <!-- View Detail Modal -->
            <div
                id="viewModal"
                class="bg-zinc-900 border border-white/10 rounded-3xl w-full max-w-2xl hidden modal-container relative"
            >
                <button
                    onclick="closeModals()"
                    class="absolute top-6 right-6 text-zinc-500 hover:text-white"
                >
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
                <div id="viewArea" class="p-8 md:p-12"></div>
            </div>
        </div>

        <script>
            const API_URL = "https://futi-noticeboard.onrender.com/api";
            let allNotices = [];
            let isLoggedIn = localStorage.getItem("nb_auth") === "true";
            let tempAttachment = null;

            window.onload = () => {
                updateAuthUI();
                fetchNotices();
            };

            async function fetchNotices() {
                try {
                    const res = await fetch(`${API_URL}/notices`);
                    allNotices = await res.json();
                    updateCounts();
                    renderGrid(allNotices);
                } catch (err) {
                    console.error(err);
                }
            }

            function updateCounts() {
                ["urgent", "events", "academic", "administrative"].forEach(
                    (cat) => {
                        const count = allNotices.filter(
                            (n) => n.category === cat,
                        ).length;
                        const el = document.querySelector(
                            `.count[data-cat="${cat}"]`,
                        );
                        if (el) el.innerText = count;
                    },
                );
            }

            function renderGrid(data) {
                const grid = document.getElementById("noticesGrid");
                grid.innerHTML = data
                    .map(
                        (n) => `
                <div class="notice-card bg-zinc-900/40 rounded-3xl p-6 flex flex-col" onclick="viewNoticeDetail('${n._id}')">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-black uppercase tracking-widest px-2 py-1 bg-white/5 rounded ${getCatColor(n.category)}">${n.category}</span>
                        ${
                            isLoggedIn
                                ? `
                            <div class="flex gap-2">
                                <button onclick="event.stopPropagation(); openEditModal('${n._id}')" class="text-zinc-500 hover:text-cyan-400"><i class="fa-solid fa-pen"></i></button>
                                <button onclick="event.stopPropagation(); deleteNotice('${n._id}')" class="text-zinc-500 hover:text-red-400"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        `
                                : ""
                        }
                    </div>
                    <h3 class="text-xl font-bold mb-2">${n.title}</h3>
                    <p class="text-zinc-500 text-sm line-clamp-2 mb-4">${n.content}</p>
                    ${n.attachment ? `<div class="text-[10px] text-cyan-400 mb-4"><i class="fa-solid fa-paperclip"></i> ${n.attachment.name}</div>` : ""}
                    <div class="mt-auto pt-4 border-t border-white/5 flex justify-between items-center text-[11px] text-zinc-500">
                        <span>${n.author}</span>
                        <span>${new Date(n.date).toLocaleDateString()}</span>
                    </div>
                </div>
            `,
                    )
                    .join("");
            }

            function getCatColor(cat) {
                const colors = {
                    urgent: "text-red-400",
                    events: "text-emerald-400",
                    academic: "text-violet-400",
                };
                return colors[cat] || "text-cyan-400";
            }

            function filterByCategory(cat) {
                document
                    .querySelectorAll("aside nav button")
                    .forEach((b) => b.classList.remove("active-filter"));
                document
                    .getElementById(`nav-${cat}`)
                    .classList.add("active-filter");
                const filtered =
                    cat === "all"
                        ? allNotices
                        : allNotices.filter((n) => n.category === cat);
                renderGrid(filtered);
            }

            function openPostModal() {
                document.getElementById("editId").value = "";
                document.getElementById("pModalTitle").innerText = "New Notice";
                document.getElementById("pTitle").value = "";
                document.getElementById("pContent").value = "";
                document.getElementById("pAuthor").value = "Master Admin";
                document.getElementById("pFileName").innerText =
                    "Click to upload doc/image";
                tempAttachment = null;
                showModal("postModal");
            }

            function openEditModal(id) {
                const n = allNotices.find((x) => x._id === id);
                document.getElementById("editId").value = n._id;
                document.getElementById("pModalTitle").innerText =
                    "Edit Notice";
                document.getElementById("pTitle").value = n.title;
                document.getElementById("pCat").value = n.category;
                document.getElementById("pContent").value = n.content;
                document.getElementById("pAuthor").value = n.author;
                document.getElementById("pFileName").innerText = n.attachment
                    ? n.attachment.name
                    : "Click to upload doc/image";
                tempAttachment = n.attachment;
                showModal("postModal");
            }

            async function submitNotice() {
                const id = document.getElementById("editId").value;
                const data = {
                    title: document.getElementById("pTitle").value,
                    category: document.getElementById("pCat").value,
                    content: document.getElementById("pContent").value,
                    author: document.getElementById("pAuthor").value,
                    attachment: tempAttachment,
                };

                const method = id ? "PUT" : "POST";
                const url = id
                    ? `${API_URL}/notices/${id}`
                    : `${API_URL}/notices`;

                const res = await fetch(url, {
                    method,
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data),
                });

                if (res.ok) {
                    fetchNotices();
                    closeModals();
                }
            }

            async function deleteNotice(id) {
                if (confirm("Delete this notice?")) {
                    await fetch(`${API_URL}/notices/${id}`, {
                        method: "DELETE",
                    });
                    fetchNotices();
                }
            }

            function viewNoticeDetail(id) {
                const n = allNotices.find((x) => x._id === id);
                const area = document.getElementById("viewArea");
                area.innerHTML = `
                <span class="text-xs font-black uppercase text-cyan-500 mb-2 block">${n.category}</span>
                <h2 class="text-3xl font-bold mb-6">${n.title}</h2>
                <div class="flex items-center gap-2 mb-8 text-sm text-zinc-500">
                    <i class="fa-solid fa-user-circle"></i> ${n.author} • ${new Date(n.date).toLocaleDateString()}
                </div>
                <div class="text-zinc-300 leading-relaxed whitespace-pre-wrap mb-10 text-lg">${n.content}</div>

                ${
                    n.attachment
                        ? `
                    <div class="bg-white/5 border border-white/10 rounded-2xl p-6 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <i class="fa-solid fa-file-pdf text-3xl text-cyan-500"></i>
                            <div>
                                <p class="text-sm font-bold text-white">${n.attachment.name}</p>
                                <p class="text-[10px] text-zinc-500 uppercase tracking-widest">Attachment Document</p>
                            </div>
                        </div>
                        <button onclick="downloadFile('${n.attachment.data}', '${n.attachment.name}')"
                                class="bg-cyan-500 text-zinc-900 px-6 py-2.5 rounded-xl font-bold hover:bg-cyan-400 transition">
                            Download
                        </button>
                    </div>
                `
                        : ""
                }
            `;
                showModal("viewModal");
            }

            function handleFile(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = () => {
                    tempAttachment = {
                        data: reader.result,
                        name: file.name,
                        type: file.type,
                    };
                    document.getElementById("pFileName").innerText = file.name;
                };
                reader.readAsDataURL(file);
            }

            function downloadFile(base64, name) {
                const link = document.createElement("a");
                link.href = base64;
                link.download = name;
                link.click();
            }

            async function handleLogin() {
                const user = document.getElementById("lUser").value;
                const pass = document.getElementById("lPass").value;
                const res = await fetch(`${API_URL}/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username: user, password: pass }),
                });
                const data = await res.json();
                if (data.success) {
                    isLoggedIn = true;
                    localStorage.setItem("nb_auth", "true");
                    updateAuthUI();
                    closeModals();
                    renderGrid(allNotices);
                } else {
                    alert("Wrong login!");
                }
            }

            function toggleAuth() {
                if (isLoggedIn) {
                    isLoggedIn = false;
                    localStorage.removeItem("nb_auth");
                    updateAuthUI();
                    renderGrid(allNotices);
                } else {
                    showModal("loginModal");
                }
            }

            function updateAuthUI() {
                document
                    .getElementById("postBtn")
                    .classList.toggle("hidden", !isLoggedIn);
                document.getElementById("authBtn").textContent = isLoggedIn
                    ? "Logout"
                    : "Login";
            }

            function showModal(id) {
                document
                    .getElementById("modalOverlay")
                    .classList.remove("hidden");
                document
                    .querySelectorAll("#modalOverlay > div")
                    .forEach((d) => d.classList.add("hidden"));
                document.getElementById(id).classList.remove("hidden");
            }

            function closeModals() {
                document.getElementById("modalOverlay").classList.add("hidden");
            }
        </script>
    </body>
</html>
