<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NoticeBoard • Campus Hub</title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        />
        <link rel="icon" type="image/png" href="ico.png" />
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap");

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                font-family: "Inter", system-ui, sans-serif;
            }

            body {
                background-color: #09090b;
                color: white;
                min-height: 100vh;
            }

            nav {
                background-color: #18181b;
                border-bottom: 1px solid #27272a;
                position: sticky;
                top: 0;
                z-index: 50;
            }

            .nav-container {
                max-width: 1400px;
                margin: 0 auto;
                padding: 0 16px;
            }

            .nav-main {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 16px 0;
                flex-wrap: wrap;
                gap: 12px;
            }

            .logo {
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .logo-icon {
                width: 42px;
                height: 42px;
                background: linear-gradient(135deg, #22d3ee, #3b82f6);
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 24px;
            }

            .search-bar {
                flex: 1;
                max-width: 520px;
                position: relative;
            }

            .search-bar input {
                width: 100%;
                background: #27272a;
                border: 1px solid #3f3f46;
                border-radius: 9999px;
                padding: 14px 20px 14px 48px;
                color: white;
                font-size: 16px;
            }

            .search-bar i {
                position: absolute;
                left: 18px;
                top: 50%;
                transform: translateY(-50%);
                color: #71717a;
            }

            .post-btn {
                background: linear-gradient(135deg, #22d3ee, #3b82f6);
                color: white;
                border: none;
                padding: 12px 24px;
                border-radius: 9999px;
                font-weight: 600;
                display: flex;
                align-items: center;
                gap: 8px;
                cursor: pointer;
            }

            .filters {
                border-top: 1px solid #27272a;
                padding: 12px 0;
                overflow-x: auto;
                white-space: nowrap;
                -webkit-overflow-scrolling: touch;
            }

            .filter-btn {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 10px 20px;
                margin-right: 8px;
                background: #18181b;
                border: 1px solid #3f3f46;
                border-radius: 9999px;
                color: #a1a1aa;
                font-size: 14px;
                cursor: pointer;
            }

            .filter-btn.active {
                background: #27272a;
                border-color: #22d3ee;
                color: #22d3ee;
            }

            .main-container {
                max-width: 1400px;
                margin: 0 auto;
                padding: 24px 16px;
                display: flex;
                gap: 24px;
            }

            .sidebar {
                width: 280px;
                background: #18181b;
                border: 1px solid #27272a;
                border-radius: 20px;
                padding: 24px;
                height: fit-content;
                position: sticky;
                top: 90px;
            }

            .content {
                flex: 1;
            }

            .notices-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
                gap: 20px;
            }

            .notice-card {
                background: #18181b;
                border: 1px solid #27272a;
                border-radius: 20px;
                padding: 20px;
                cursor: pointer;
            }

            .modal {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.85);
                backdrop-filter: blur(8px);
                display: none;
                align-items: center;
                justify-content: center;
                z-index: 1000;
            }

            .modal-content {
                background: #18181b;
                border-radius: 24px;
                width: 100%;
                max-width: 560px;
                margin: 20px;
            }

            @media (max-width: 640px) {
                .nav-main {
                    flex-wrap: wrap;
                    gap: 12px;
                }
                .search-bar {
                    margin: 0;
                    max-width: 100%;
                    width: 100%;
                    order: 3;
                }
                .notices-grid {
                    grid-template-columns: 1fr;
                }
                .main-container {
                    flex-direction: column;
                    padding: 16px;
                }
                .sidebar {
                    display: none;
                }
                .modal-content {
                    margin: 12px;
                    border-radius: 20px;
                }
            }
        </style>
    </head>
    <body>
        <!-- HEADER -->
        <nav>
            <div class="nav-container">
                <div class="nav-main">
                    <div class="logo">
                        <div class="logo-icon">📋</div>
                        <h1>NoticeBoard</h1>
                    </div>

                    <div class="search-bar">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input
                            id="searchInput"
                            type="text"
                            placeholder="Search notices..."
                        />
                    </div>

                    <button onclick="showCreateModal()" class="post-btn">
                        <i class="fa-solid fa-plus"></i>
                        <span>Post Notice</span>
                    </button>
                </div>

                <div class="filters">
                    <button
                        onclick="filterByCategory('all')"
                        id="filter-all"
                        class="filter-btn active"
                    >
                        All Notices
                    </button>
                    <button
                        onclick="filterByCategory('urgent')"
                        id="filter-urgent"
                        class="filter-btn"
                    >
                        <i class="fa-solid fa-triangle-exclamation"></i> Urgent
                    </button>
                    <button
                        onclick="filterByCategory('events')"
                        id="filter-events"
                        class="filter-btn"
                    >
                        <i class="fa-solid fa-calendar"></i> Events
                    </button>
                    <button
                        onclick="filterByCategory('academic')"
                        id="filter-academic"
                        class="filter-btn"
                    >
                        <i class="fa-solid fa-graduation-cap"></i> Academic
                    </button>
                    <button
                        onclick="filterByCategory('admin')"
                        id="filter-admin"
                        class="filter-btn"
                    >
                        <i class="fa-solid fa-building"></i> Administrative
                    </button>
                </div>
            </div>
        </nav>

        <div class="main-container">
            <div class="sidebar">
                <div
                    style="
                        margin-bottom: 20px;
                        font-size: 12px;
                        text-transform: uppercase;
                        color: #71717a;
                    "
                >
                    Quick Links
                </div>
                <div
                    onclick="filterByCategory('all')"
                    style="
                        padding: 14px 16px;
                        border-radius: 12px;
                        cursor: pointer;
                        margin-bottom: 6px;
                    "
                >
                    🏠 Dashboard
                </div>
                <div
                    onclick="filterByCategory('my-posts')"
                    style="
                        padding: 14px 16px;
                        border-radius: 12px;
                        cursor: pointer;
                        margin-bottom: 20px;
                    "
                >
                    ✍️ My Posted Notices
                </div>
            </div>

            <div class="content">
                <h2 id="pageTitle" style="font-size: 2rem; margin-bottom: 8px">
                    All Notices
                </h2>
                <p
                    id="pageSubtitle"
                    style="color: #a1a1aa; margin-bottom: 24px"
                >
                    Real-time notices • Powered by MongoDB Atlas
                </p>
                <div id="noticesGrid" class="notices-grid"></div>
            </div>
        </div>

        <!-- Create Modal -->
        <div id="createModal" class="modal">
            <div class="modal-content">
                <div style="padding: 24px">
                    <div
                        style="
                            display: flex;
                            justify-content: space-between;
                            align-items: center;
                            margin-bottom: 20px;
                        "
                    >
                        <h3 id="modalTitle" style="font-size: 1.5rem">
                            Create New Notice
                        </h3>
                        <button
                            onclick="hideCreateModal()"
                            style="
                                font-size: 28px;
                                color: #71717a;
                                background: none;
                                border: none;
                            "
                        >
                            ×
                        </button>
                    </div>
                    <form id="noticeForm" onsubmit="handleFormSubmit(event)">
                        <input type="hidden" id="editId" />
                        <div
                            style="
                                display: grid;
                                grid-template-columns: 1fr 1fr;
                                gap: 16px;
                                margin-bottom: 16px;
                            "
                        >
                            <div>
                                <label
                                    style="
                                        display: block;
                                        margin-bottom: 6px;
                                        font-size: 14px;
                                        color: #a1a1aa;
                                    "
                                    >Title</label
                                >
                                <input
                                    id="formTitle"
                                    required
                                    type="text"
                                    style="
                                        width: 100%;
                                        background: #27272a;
                                        border: 1px solid #3f3f46;
                                        border-radius: 12px;
                                        padding: 14px;
                                        color: white;
                                    "
                                />
                            </div>
                            <div>
                                <label
                                    style="
                                        display: block;
                                        margin-bottom: 6px;
                                        font-size: 14px;
                                        color: #a1a1aa;
                                    "
                                    >Category</label
                                >
                                <select
                                    id="formCategory"
                                    style="
                                        width: 100%;
                                        background: #27272a;
                                        border: 1px solid #3f3f46;
                                        border-radius: 12px;
                                        padding: 14px;
                                        color: white;
                                    "
                                >
                                    <option value="urgent">Urgent</option>
                                    <option value="events">Events</option>
                                    <option value="academic">Academic</option>
                                    <option value="admin" selected>
                                        Administrative
                                    </option>
                                </select>
                            </div>
                        </div>
                        <div style="margin-bottom: 20px">
                            <label
                                style="
                                    display: block;
                                    margin-bottom: 6px;
                                    font-size: 14px;
                                    color: #a1a1aa;
                                "
                                >Full Content</label
                            >
                            <textarea
                                id="formContent"
                                required
                                rows="6"
                                style="
                                    width: 100%;
                                    background: #27272a;
                                    border: 1px solid #3f3f46;
                                    border-radius: 12px;
                                    padding: 14px;
                                    color: white;
                                    resize: none;
                                "
                            ></textarea>
                        </div>
                        <div style="display: flex; gap: 12px">
                            <button
                                type="button"
                                onclick="hideCreateModal()"
                                style="
                                    flex: 1;
                                    padding: 16px;
                                    background: transparent;
                                    border: 1px solid #52525b;
                                    border-radius: 9999px;
                                    color: white;
                                "
                            >
                                Cancel
                            </button>
                            <button
                                type="submit"
                                style="
                                    flex: 1;
                                    padding: 16px;
                                    background: linear-gradient(
                                        135deg,
                                        #22d3ee,
                                        #3b82f6
                                    );
                                    border: none;
                                    border-radius: 9999px;
                                    color: white;
                                    font-weight: 600;
                                "
                            >
                                Post Notice
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- View Modal -->
        <div id="viewModal" class="modal">
            <div class="modal-content" style="max-width: 700px">
                <div id="viewContent" style="padding: 28px"></div>
                <div
                    style="
                        padding: 20px;
                        text-align: right;
                        border-top: 1px solid #27272a;
                    "
                >
                    <button
                        onclick="hideViewModal()"
                        style="
                            padding: 12px 32px;
                            background: transparent;
                            border: 1px solid #52525b;
                            border-radius: 9999px;
                            color: white;
                        "
                    >
                        Close
                    </button>
                </div>
            </div>
        </div>

        <script>
            let notices = [];
            let currentFilter = "all";
            let editModeId = null;
            let isLoggedIn = false;
            const API_BASE = "https://futi-noticeboard.onrender.com";

            async function fetchNotices() {
                try {
                    const res = await fetch(`${API_BASE}/api/notices`);
                    notices = await res.json();
                    renderNotices(notices);
                } catch (e) {
                    console.log("%cBackend not running", "color:#22d3ee");
                    notices = [];
                    renderNotices([]);
                }
            }

            function renderNotices(filteredNotices) {
                const grid = document.getElementById("noticesGrid");
                grid.innerHTML = "";
                if (filteredNotices.length === 0) {
                    grid.innerHTML = `<div style="text-align:center; padding:60px 20px; color:#71717a;"><i class="fa-solid fa-inbox" style="font-size:60px; margin-bottom:20px; opacity:0.3;"></i><p>No notices yet</p></div>`;
                    return;
                }
                filteredNotices.forEach((notice) => {
                    const card = document.createElement("div");
                    card.className = "notice-card";
                    card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <i class="fa-solid ${getIcon(notice.category)}" style="font-size:24px; color:#22d3ee;"></i>
                            <span style="font-size:12px; padding:4px 14px; border-radius:9999px; background:#27272a; color:#a1a1aa;">${notice.category}</span>
                        </div>
                        <button onclick="event.stopImmediatePropagation(); deleteNoticeFromBackend('${notice._id}')" style="background:none; border:none; color:#ef4444; cursor:pointer;">🗑</button>
                    </div>
                    <h3 style="font-size:1.25rem; margin-bottom:10px;">${notice.title}</h3>
                    <p style="color:#a1a1aa; line-height:1.5; margin-bottom:16px;">${notice.content.substring(0, 120)}...</p>
                    <div style="display:flex; justify-content:space-between; font-size:14px; color:#71717a;">
                        <span>${notice.author}</span>
                        <span>${new Date(notice.date).toLocaleDateString("en-US", { month: "short", day: "numeric" })}</span>
                    </div>
                `;
                    card.onclick = () => viewNotice(notice._id);
                    grid.appendChild(card);
                });
            }

            function getIcon(cat) {
                if (cat === "urgent") return "fa-triangle-exclamation";
                if (cat === "events") return "fa-calendar";
                if (cat === "academic") return "fa-graduation-cap";
                return "fa-building";
            }

            function filterByCategory(category) {
                currentFilter = category;
                document
                    .querySelectorAll(".filter-btn")
                    .forEach((btn) => btn.classList.remove("active"));
                document
                    .getElementById(`filter-${category}`)
                    .classList.add("active");
                let filtered =
                    category === "all"
                        ? notices
                        : notices.filter((n) => n.category === category);
                renderNotices(filtered);
            }

            function showCreateModal() {
                if (!isLoggedIn) {
                    showLoginModal();
                    return;
                }
                editModeId = null;
                document.getElementById("modalTitle").textContent =
                    "Create New Notice";
                document.getElementById("noticeForm").reset();
                document.getElementById("createModal").style.display = "flex";
            }

            function hideCreateModal() {
                document.getElementById("createModal").style.display = "none";
            }

            async function handleFormSubmit(e) {
                e.preventDefault();
                const title = document.getElementById("formTitle").value;
                const category = document.getElementById("formCategory").value;
                const content = document.getElementById("formContent").value;

                const data = {
                    title,
                    content,
                    category,
                    author: "Master Admin",
                };

                try {
                    await fetch(`${API_BASE}/api/notices`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data),
                    });
                    hideCreateModal();
                    fetchNotices();
                } catch (err) {
                    alert("✅ Notice posted successfully!");
                    hideCreateModal();
                    fetchNotices();
                }
            }

            function showLoginModal() {
                const modal = document.createElement("div");
                modal.id = "loginModal";
                modal.className = "modal";
                modal.style.display = "flex";
                modal.innerHTML = `
                <div class="modal-content" style="max-width:400px;">
                    <div style="padding:32px;">
                        <h3 style="text-align:center; margin-bottom:24px;">Master Admin Login</h3>
                        <input id="loginPass" type="password" placeholder="Enter Master Password" style="width:100%; padding:16px; background:#27272a; border:1px solid #3f3f46; border-radius:12px; color:white; margin-bottom:20px;">
                        <button onclick="attemptLogin()" style="width:100%; padding:16px; background:linear-gradient(135deg,#22d3ee,#3b82f6); border:none; border-radius:9999px; color:white; font-weight:600;">Login</button>
                    </div>
                </div>`;
                document.body.appendChild(modal);
            }

            async function attemptLogin() {
                const pass = document.getElementById("loginPass").value;
                try {
                    const res = await fetch(`${API_BASE}/api/login`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            username: "futinotice",
                            password: pass,
                        }),
                    });
                    const data = await res.json();
                    if (data.success) {
                        isLoggedIn = true;
                        document.getElementById("loginModal").remove();
                        alert("✅ Login Successful!");
                    } else {
                        alert("❌ Wrong Password");
                    }
                } catch (e) {
                    alert("Backend not running");
                }
            }

            function hideViewModal() {
                document.getElementById("viewModal").style.display = "none";
            }

            async function deleteNoticeFromBackend(id) {
                if (!confirm("Delete this notice?")) return;
                await fetch(`${API_BASE}/api/notices/${id}`, {
                    method: "DELETE",
                });
                fetchNotices();
            }

            function viewNotice(id) {
                const notice = notices.find((n) => n._id === id);
                if (!notice) return;
                // Simple view modal implementation
                document.getElementById("viewModal").style.display = "flex";
                // You can expand viewContent if needed
            }

            window.onload = () => {
                fetchNotices();
            };
        </script>
    </body>
</html>
