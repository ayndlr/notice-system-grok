<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>NoticeBoard • Campus Hub</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
        />
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");
            * {
                font-family: "Inter", sans-serif;
            }
            ::-webkit-scrollbar {
                width: 6px;
            }
            ::-webkit-scrollbar-track {
                background: #09090b;
            }
            ::-webkit-scrollbar-thumb {
                background: #27272a;
                border-radius: 10px;
            }
            .notice-card {
                transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                border: 1px solid rgba(255, 255, 255, 0.05);
            }
            .notice-card:hover {
                transform: translateY(-4px);
                border-color: rgba(0, 212, 255, 0.3);
                box-shadow: 0 20px 40px -12px rgba(0, 212, 255, 0.15);
            }
            .active-filter {
                background: rgba(0, 212, 255, 0.1);
                color: #22d3ee;
                border-left: 3px solid #22d3ee;
            }
            .glass {
                background: rgba(24, 24, 27, 0.7);
                backdrop-filter: blur(12px);
            }
            .modal-enter {
                animation: modalAnim 0.3s ease-out forwards;
            }
            @keyframes modalAnim {
                from {
                    opacity: 0;
                    transform: scale(0.95) translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: scale(1) translateY(0);
                }
            }
        </style>
    </head>
    <body class="bg-[#09090b] text-zinc-100 min-h-screen">
        <!-- NAVIGATION -->
        <nav
            class="sticky top-0 z-[100] glass border-b border-white/5 px-4 md:px-8 py-4"
        >
            <div
                class="max-w-[1600px] mx-auto flex items-center justify-between gap-6"
            >
                <div class="flex items-center gap-3">
                    <div
                        class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center shadow-lg shadow-cyan-500/20"
                    >
                        <i
                            class="fa-solid fa-clipboard-list text-zinc-900 text-xl"
                        ></i>
                    </div>
                    <div class="hidden sm:block">
                        <h1 class="text-xl font-bold tracking-tight">
                            NoticeBoard
                        </h1>
                        <span
                            class="text-[10px] text-cyan-500 font-bold uppercase tracking-widest bg-cyan-500/10 px-1.5 py-0.5 rounded"
                            >Campus Hub</span
                        >
                    </div>
                </div>

                <div class="flex-1 max-w-2xl relative group">
                    <i
                        class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 group-focus-within:text-cyan-400 transition-colors"
                    ></i>
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="Search notices, titles, or authors..."
                        class="w-full bg-zinc-900/50 border border-white/10 rounded-2xl py-3 pl-12 pr-4 outline-none focus:ring-2 focus:ring-cyan-500/30 transition-all"
                    />
                </div>

                <div class="flex items-center gap-4">
                    <button
                        onclick="toggleAuth()"
                        id="authBtn"
                        class="text-sm font-medium hover:text-cyan-400 transition"
                    >
                        Login
                    </button>
                    <button
                        onclick="openPostModal()"
                        id="postBtn"
                        class="hidden bg-cyan-500 hover:bg-cyan-400 text-zinc-900 px-5 py-2.5 rounded-xl font-bold transition flex items-center gap-2 shadow-lg shadow-cyan-500/20"
                    >
                        <i class="fa-solid fa-plus"></i>
                        <span class="hidden md:inline">Post Notice</span>
                    </button>
                </div>
            </div>
        </nav>

        <div
            class="max-w-[1600px] mx-auto px-4 md:px-8 py-8 flex flex-col md:flex-row gap-8"
        >
            <!-- SIDEBAR -->
            <aside class="w-full md:w-72 shrink-0 space-y-8">
                <div>
                    <p
                        class="text-[11px] font-bold text-zinc-500 uppercase tracking-[0.2em] mb-4 ml-2"
                    >
                        Quick Links
                    </p>
                    <nav class="space-y-1">
                        <button
                            onclick="filterByCategory('all')"
                            id="nav-all"
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition active-filter"
                        >
                            <i class="fa-solid fa-house text-sm"></i> Dashboard
                        </button>
                        <button
                            onclick="filterMyNotices()"
                            id="nav-my"
                            class="w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-white/5 transition hidden"
                        >
                            <i class="fa-solid fa-user-pen text-sm"></i> My
                            Posted Notices
                        </button>
                    </nav>
                </div>

                <div>
                    <p
                        class="text-[11px] font-bold text-zinc-500 uppercase tracking-[0.2em] mb-4 ml-2"
                    >
                        Categories
                    </p>
                    <nav class="space-y-1" id="categoryNav">
                        <button
                            onclick="filterByCategory('urgent')"
                            id="nav-urgent"
                            class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-white/5 transition group"
                        >
                            <span class="flex items-center gap-3"
                                ><i
                                    class="fa-solid fa-triangle-exclamation text-red-400"
                                ></i>
                                Urgent</span
                            >
                            <span
                                class="text-[10px] bg-red-400/10 text-red-400 px-2 py-0.5 rounded-full count"
                                data-cat="urgent"
                                >0</span
                            >
                        </button>
                        <button
                            onclick="filterByCategory('events')"
                            id="nav-events"
                            class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-white/5 transition group"
                        >
                            <span class="flex items-center gap-3"
                                ><i
                                    class="fa-solid fa-calendar-star text-emerald-400"
                                ></i>
                                Events</span
                            >
                            <span
                                class="text-[10px] bg-emerald-400/10 text-emerald-400 px-2 py-0.5 rounded-full count"
                                data-cat="events"
                                >0</span
                            >
                        </button>
                        <button
                            onclick="filterByCategory('academic')"
                            id="nav-academic"
                            class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-white/5 transition group"
                        >
                            <span class="flex items-center gap-3"
                                ><i
                                    class="fa-solid fa-graduation-cap text-violet-400"
                                ></i>
                                Academic</span
                            >
                            <span
                                class="text-[10px] bg-violet-400/10 text-violet-400 px-2 py-0.5 rounded-full count"
                                data-cat="academic"
                                >0</span
                            >
                        </button>
                        <button
                            onclick="filterByCategory('administrative')"
                            id="nav-administrative"
                            class="w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-white/5 transition group"
                        >
                            <span class="flex items-center gap-3"
                                ><i
                                    class="fa-solid fa-building-columns text-amber-400"
                                ></i>
                                Administrative</span
                            >
                            <span
                                class="text-[10px] bg-amber-400/10 text-amber-400 px-2 py-0.5 rounded-full count"
                                data-cat="administrative"
                                >0</span
                            >
                        </button>
                    </nav>
                </div>
            </aside>

            <!-- MAIN GRID -->
            <main class="flex-1">
                <div class="mb-8">
                    <h2
                        id="mainHeading"
                        class="text-3xl font-bold text-white mb-2"
                    >
                        All Notices
                    </h2>
                    <p class="text-zinc-500 flex items-center gap-2">
                        <span
                            class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"
                        ></span>
                        Real-time notices • Powered by MongoDB Atlas
                    </p>
                </div>

                <div
                    id="noticesGrid"
                    class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-2 2xl:grid-cols-3 gap-6"
                >
                    <!-- Skeleton Loader -->
                    <div class="col-span-full py-20 text-center text-zinc-600">
                        <i
                            class="fa-solid fa-circle-notch fa-spin text-3xl mb-4"
                        ></i>
                        <p>Fetching latest updates...</p>
                    </div>
                </div>
            </main>
        </div>

        <!-- MODALS -->
        <div
            id="modalOverlay"
            class="fixed inset-0 bg-black/90 backdrop-blur-md z-[200] hidden flex items-center justify-center p-4"
        >
            <!-- Auth Modal -->
            <div
                id="loginModal"
                class="bg-zinc-900 border border-white/10 rounded-[2rem] p-10 w-full max-w-md hidden modal-enter"
            >
                <div class="text-center mb-8">
                    <div
                        class="w-16 h-16 bg-cyan-500/10 text-cyan-400 rounded-2xl flex items-center justify-center text-2xl mx-auto mb-4"
                    >
                        <i class="fa-solid fa-user-shield"></i>
                    </div>
                    <h3 class="text-2xl font-bold">Admin Portal</h3>
                    <p class="text-zinc-500 text-sm mt-2">
                        Identify yourself to manage the board
                    </p>
                </div>
                <div class="space-y-4">
                    <input
                        type="text"
                        id="lUser"
                        placeholder="Username"
                        class="w-full bg-black/40 border border-white/5 rounded-xl px-5 py-4 outline-none focus:border-cyan-500 transition"
                    />
                    <input
                        type="password"
                        id="lPass"
                        placeholder="Password"
                        class="w-full bg-black/40 border border-white/5 rounded-xl px-5 py-4 outline-none focus:border-cyan-500 transition"
                    />
                    <button
                        onclick="handleLogin()"
                        id="lBtn"
                        class="w-full bg-cyan-500 hover:bg-cyan-400 text-zinc-900 font-bold py-4 rounded-xl shadow-lg shadow-cyan-500/20 transition mt-4"
                    >
                        Login
                    </button>
                    <button
                        onclick="closeModals()"
                        class="w-full text-zinc-500 text-sm py-2"
                    >
                        Go back
                    </button>
                </div>
            </div>

            <!-- Post/Edit Modal -->
            <div
                id="postModal"
                class="bg-zinc-900 border border-white/10 rounded-[2rem] w-full max-w-2xl overflow-hidden hidden modal-enter"
            >
                <div
                    class="p-8 border-b border-white/5 flex justify-between items-center bg-white/5"
                >
                    <h3 id="pModalTitle" class="text-2xl font-bold">
                        Create New Notice
                    </h3>
                    <button
                        onclick="closeModals()"
                        class="text-zinc-500 hover:text-white"
                    >
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                </div>
                <div class="p-8 space-y-6">
                    <input type="hidden" id="editId" />
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label
                                class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest ml-1"
                                >Notice Title</label
                            >
                            <input
                                type="text"
                                id="pTitle"
                                placeholder="e.g. Exam Schedule Update"
                                class="w-full bg-black/40 border border-white/5 rounded-xl px-4 py-3.5 outline-none focus:border-cyan-500"
                            />
                        </div>
                        <div class="space-y-2">
                            <label
                                class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest ml-1"
                                >Category</label
                            >
                            <select
                                id="pCat"
                                class="w-full bg-black/40 border border-white/5 rounded-xl px-4 py-3.5 outline-none focus:border-cyan-500 appearance-none"
                            >
                                <option value="urgent">Urgent</option>
                                <option value="events">Events</option>
                                <option value="academic">Academic</option>
                                <option value="administrative" selected>
                                    Administrative
                                </option>
                            </select>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label
                            class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest ml-1"
                            >Description</label
                        >
                        <textarea
                            id="pContent"
                            rows="4"
                            placeholder="Describe the announcement in detail..."
                            class="w-full bg-black/40 border border-white/5 rounded-xl px-4 py-3.5 outline-none focus:border-cyan-500 resize-none"
                        ></textarea>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label
                                class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest ml-1"
                                >Author / Department</label
                            >
                            <input
                                type="text"
                                id="pAuthor"
                                placeholder="Master Admin"
                                class="w-full bg-black/40 border border-white/5 rounded-xl px-4 py-3.5 outline-none focus:border-cyan-500"
                            />
                        </div>
                        <div class="space-y-2">
                            <label
                                class="text-[11px] font-bold text-zinc-500 uppercase tracking-widest ml-1"
                                >Attachment</label
                            >
                            <input
                                type="file"
                                id="pFile"
                                class="hidden"
                                onchange="handleFile(event)"
                            />
                            <label
                                for="pFile"
                                class="w-full bg-cyan-500/5 border border-cyan-500/20 rounded-xl px-4 py-3.5 flex items-center justify-between cursor-pointer hover:bg-cyan-500/10 transition"
                            >
                                <span
                                    id="pFileName"
                                    class="text-zinc-400 text-sm truncate"
                                    >Select file (Max 5MB)</span
                                >
                                <i
                                    class="fa-solid fa-paperclip text-cyan-500"
                                ></i>
                            </label>
                        </div>
                    </div>
                    <button
                        onclick="submitNotice()"
                        id="pBtn"
                        class="w-full bg-cyan-500 text-zinc-900 font-bold py-4 rounded-xl shadow-lg shadow-cyan-500/20 transition mt-2"
                    >
                        Publish Notice
                    </button>
                </div>
            </div>

            <!-- View Detail Modal -->
            <div
                id="viewModal"
                class="bg-zinc-900 border border-white/10 rounded-[2.5rem] w-full max-w-2xl hidden modal-enter overflow-hidden relative"
            >
                <button
                    onclick="closeModals()"
                    class="absolute top-6 right-6 text-zinc-500 hover:text-white z-10"
                >
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
                <div id="viewArea" class="p-10 pb-12"></div>
            </div>
        </div>

        <script>
            // CONFIG
            const API_URL = "https://futi-noticeboard.onrender.com/api";

            // STATE
            let allNotices = [];
            let filteredNotices = [];
            let currentCat = "all";
            let isLoggedIn = localStorage.getItem("nb_auth") === "true";
            let tempAttachment = null;

            // INIT
            window.onload = () => {
                updateAuthUI();
                fetchNotices();
            };

            // DATA FLOW
            async function fetchNotices() {
                try {
                    const res = await fetch(`${API_URL}/notices`);
                    allNotices = await res.json();
                    updateCounts();
                    filterByCategory(currentCat);
                } catch (err) {
                    document.getElementById("noticesGrid").innerHTML = `
                    <div class="col-span-full py-20 text-center text-red-400/50">
                        <i class="fa-solid fa-triangle-exclamation text-4xl mb-4"></i>
                        <p>Connection lost. Ensure server is online.</p>
                    </div>`;
                }
            }

            function updateCounts() {
                const categories = [
                    "urgent",
                    "events",
                    "academic",
                    "administrative",
                ];
                categories.forEach((cat) => {
                    const count = allNotices.filter(
                        (n) => n.category === cat,
                    ).length;
                    document.querySelector(
                        `.count[data-cat="${cat}"]`,
                    ).innerText = count;
                });
            }

            function renderGrid(data) {
                const grid = document.getElementById("noticesGrid");
                if (data.length === 0) {
                    grid.innerHTML = `<div class="col-span-full py-20 text-center text-zinc-600">No notices found in this selection.</div>`;
                    return;
                }

                grid.innerHTML = data
                    .map(
                        (n) => `
                <div class="notice-card bg-zinc-900/40 rounded-3xl p-6 flex flex-col cursor-pointer" onclick="viewNoticeDetail('${n._id}')">
                    <div class="flex items-center justify-between mb-6">
                        <div class="flex items-center gap-2">
                            <div class="w-8 h-8 rounded-lg bg-zinc-800 flex items-center justify-center text-zinc-400">
                                <i class="${getCatIcon(n.category)}"></i>
                            </div>
                            <span class="text-[10px] font-black uppercase tracking-widest ${getCatTextColor(n.category)} bg-zinc-800/50 px-2 py-1 rounded-md">
                                ${n.category}
                            </span>
                        </div>
                        <div class="flex gap-2">
                            ${
                                isLoggedIn
                                    ? `
                                <button onclick="event.stopPropagation(); openEditModal('${n._id}')" class="w-8 h-8 rounded-lg hover:bg-cyan-500/10 text-zinc-500 hover:text-cyan-400 transition"><i class="fa-solid fa-pen-to-square text-xs"></i></button>
                                <button onclick="event.stopPropagation(); deleteNotice('${n._id}')" class="w-8 h-8 rounded-lg hover:bg-red-500/10 text-zinc-500 hover:text-red-400 transition"><i class="fa-solid fa-trash text-xs"></i></button>
                            `
                                    : ""
                            }
                        </div>
                    </div>
                    <h3 class="text-xl font-bold mb-3 line-clamp-2">${n.title}</h3>
                    <p class="text-zinc-500 text-sm line-clamp-3 mb-6 leading-relaxed">${n.content}</p>
                    <div class="mt-auto pt-6 border-t border-white/5 flex items-center justify-between">
                        <div class="flex items-center gap-2 text-[11px] font-medium text-zinc-400">
                            <i class="fa-solid fa-user-circle text-zinc-600 text-sm"></i>
                            ${n.author}
                        </div>
                        <span class="text-[10px] font-bold text-zinc-600">${formatDate(n.date)}</span>
                    </div>
                </div>
            `,
                    )
                    .join("");
            }

            // HELPERS
            function getCatIcon(cat) {
                const icons = {
                    urgent: "fa-solid fa-triangle-exclamation",
                    events: "fa-solid fa-calendar-star",
                    academic: "fa-solid fa-graduation-cap",
                    administrative: "fa-solid fa-building-columns",
                };
                return icons[cat] || "fa-solid fa-info-circle";
            }

            function getCatTextColor(cat) {
                const colors = {
                    urgent: "text-red-400",
                    events: "text-emerald-400",
                    academic: "text-violet-400",
                    administrative: "text-amber-400",
                };
                return colors[cat] || "text-cyan-400";
            }

            function formatDate(d) {
                const date = new Date(d);
                return date.toLocaleDateString("en-US", {
                    month: "short",
                    day: "numeric",
                });
            }

            // ACTIONS
            function filterByCategory(cat) {
                currentCat = cat;
                document
                    .querySelectorAll('[id^="nav-"]')
                    .forEach((el) => el.classList.remove("active-filter"));
                document
                    .getElementById(`nav-${cat}`)
                    .classList.add("active-filter");

                document.getElementById("mainHeading").innerText =
                    cat === "all"
                        ? "All Notices"
                        : cat.charAt(0).toUpperCase() +
                          cat.slice(1) +
                          " Notices";

                filteredNotices =
                    cat === "all"
                        ? allNotices
                        : allNotices.filter((n) => n.category === cat);
                renderGrid(filteredNotices);
            }

            function filterMyNotices() {
                currentCat = "my";
                document
                    .querySelectorAll('[id^="nav-"]')
                    .forEach((el) => el.classList.remove("active-filter"));
                document
                    .getElementById("nav-my")
                    .classList.add("active-filter");
                document.getElementById("mainHeading").innerText =
                    "My Posted Notices";

                // For simplicity, we define "My" as notices with the current admin name or just a placeholder logic
                // In a real app, this would filter by user ID.
                renderGrid(
                    allNotices.filter(
                        (n) =>
                            n.author === "Master Admin" ||
                            n.author === "ISSTICKZ",
                    ),
                );
            }

            document
                .getElementById("searchInput")
                .addEventListener("input", (e) => {
                    const q = e.target.value.toLowerCase();
                    const results = allNotices.filter(
                        (n) =>
                            n.title.toLowerCase().includes(q) ||
                            n.content.toLowerCase().includes(q) ||
                            n.author.toLowerCase().includes(q),
                    );
                    renderGrid(results);
                });

            // MODAL MANAGEMENT
            function openPostModal() {
                document.getElementById("editId").value = "";
                document.getElementById("pModalTitle").innerText =
                    "Create New Notice";
                document.getElementById("pBtn").innerText = "Publish Notice";
                document.getElementById("pTitle").value = "";
                document.getElementById("pContent").value = "";
                document.getElementById("pAuthor").value = "Master Admin";
                document.getElementById("pFileName").innerText =
                    "Select file (Max 5MB)";
                tempAttachment = null;

                showModal("postModal");
            }

            async function openEditModal(id) {
                const n = allNotices.find((item) => item._id === id);
                if (!n) return;

                document.getElementById("editId").value = n._id;
                document.getElementById("pModalTitle").innerText =
                    "Edit Notice";
                document.getElementById("pBtn").innerText = "Save Changes";
                document.getElementById("pTitle").value = n.title;
                document.getElementById("pCat").value = n.category;
                document.getElementById("pContent").value = n.content;
                document.getElementById("pAuthor").value = n.author;
                document.getElementById("pFileName").innerText = n.attachment
                    ? n.attachment.name
                    : "Select file (Max 5MB)";
                tempAttachment = n.attachment;

                showModal("postModal");
            }

            async function submitNotice() {
                const btn = document.getElementById("pBtn");
                const editId = document.getElementById("editId").value;
                const data = {
                    title: document.getElementById("pTitle").value,
                    category: document.getElementById("pCat").value,
                    content: document.getElementById("pContent").value,
                    author: document.getElementById("pAuthor").value,
                    attachment: tempAttachment,
                };

                if (!data.title || !data.content)
                    return alert("Title and Content are required!");

                btn.disabled = true;
                btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin mr-2"></i> Processing...`;

                try {
                    const method = editId ? "PUT" : "POST";
                    const url = editId
                        ? `${API_URL}/notices/${editId}`
                        : `${API_URL}/notices`;

                    const res = await fetch(url, {
                        method,
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data),
                    });

                    if (res.ok) {
                        await fetchNotices();
                        closeModals();
                    }
                } catch (err) {
                    alert("Operation failed. Try again.");
                } finally {
                    btn.disabled = false;
                    btn.innerText = editId ? "Save Changes" : "Publish Notice";
                }
            }

            async function deleteNotice(id) {
                if (
                    !confirm(
                        "Are you sure you want to delete this notice forever?",
                    )
                )
                    return;
                try {
                    await fetch(`${API_URL}/notices/${id}`, {
                        method: "DELETE",
                    });
                    fetchNotices();
                } catch (err) {
                    alert("Delete failed");
                }
            }

            function viewNoticeDetail(id) {
                const n = allNotices.find((item) => item._id === id);
                if (!n) return;

                const area = document.getElementById("viewArea");
                area.innerHTML = `
                <div class="flex items-center gap-3 mb-6">
                    <span class="text-[10px] font-black uppercase tracking-widest ${getCatTextColor(n.category)} bg-zinc-800 px-3 py-1.5 rounded-lg">
                        ${n.category}
                    </span>
                    <span class="text-zinc-500 text-xs font-medium">
                        <i class="fa-solid fa-calendar mr-1.5"></i> ${new Date(n.date).toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" })}
                    </span>
                </div>
                <h2 class="text-4xl font-black mb-8 leading-tight">${n.title}</h2>
                <div class="flex items-center gap-3 mb-10 pb-8 border-b border-white/5">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-cyan-500 to-blue-500 flex items-center justify-center text-zinc-900 font-bold">
                        ${n.author[0]}
                    </div>
                    <div>
                        <p class="text-sm font-bold text-white">${n.author}</p>
                        <p class="text-[11px] text-zinc-500 uppercase tracking-widest font-medium">Official Contributor</p>
                    </div>
                </div>
                <div class="text-zinc-300 leading-relaxed text-lg whitespace-pre-wrap mb-10">
                    ${n.content}
                </div>
                ${
                    n.attachment
                        ? `
                    <div class="bg-white/5 rounded-2xl p-6 border border-white/5 flex items-center justify-between group">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-xl bg-zinc-800 flex items-center justify-center text-cyan-400 text-xl">
                                <i class="fa-solid fa-file-lines"></i>
                            </div>
                            <div>
                                <p class="text-sm font-bold text-white">${n.attachment.name}</p>
                                <p class="text-xs text-zinc-500 uppercase tracking-widest">Document Attachment</p>
                            </div>
                        </div>
                        <button onclick="downloadFile('${n.attachment.data}', '${n.attachment.name}')" class="px-6 py-3 bg-white hover:bg-cyan-400 text-zinc-900 font-bold rounded-xl transition">
                            Download
                        </button>
                    </div>
                `
                        : ""
                }
                <div class="mt-12 flex justify-center">
                    <button onclick="closeModals()" class="px-8 py-3 bg-zinc-800 hover:bg-zinc-700 text-white font-bold rounded-xl transition">Close Preview</button>
                </div>
            `;
                showModal("viewModal");
            }

            // FILE HANDLING
            function handleFile(e) {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 5 * 1024 * 1024)
                    return alert("File too large (Max 5MB)");

                const reader = new FileReader();
                reader.onload = () => {
                    tempAttachment = {
                        data: reader.result,
                        name: file.name,
                        type: file.type,
                    };
                    document.getElementById("pFileName").textContent =
                        file.name;
                };
                reader.readAsDataURL(file);
            }

            function downloadFile(base64, name) {
                const link = document.createElement("a");
                link.href = base64;
                link.download = name;
                link.click();
            }

            // AUTH LOGIC
            async function handleLogin() {
                const user = document.getElementById("lUser").value;
                const pass = document.getElementById("lPass").value;
                const btn = document.getElementById("lBtn");

                btn.disabled = true;
                btn.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i>`;

                try {
                    const res = await fetch(`${API_URL}/login`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            username: user,
                            password: pass,
                        }),
                    });
                    const data = await res.json();
                    if (data.success) {
                        isLoggedIn = true;
                        localStorage.setItem("nb_auth", "true");
                        updateAuthUI();
                        closeModals();
                    } else {
                        alert("Unauthorized Access!");
                    }
                } catch (err) {
                    alert("Server error. Try again.");
                } finally {
                    btn.disabled = false;
                    btn.innerText = "Login";
                }
            }

            function toggleAuth() {
                if (isLoggedIn) {
                    isLoggedIn = false;
                    localStorage.removeItem("nb_auth");
                    updateAuthUI();
                    renderGrid(filteredNotices);
                } else {
                    showModal("loginModal");
                }
            }

            function updateAuthUI() {
                document
                    .getElementById("postBtn")
                    .classList.toggle("hidden", !isLoggedIn);
                document
                    .getElementById("nav-my")
                    .classList.toggle("hidden", !isLoggedIn);
                document.getElementById("authBtn").textContent = isLoggedIn
                    ? "Logout"
                    : "Login";
            }

            // MODAL WRAPPERS
            function showModal(id) {
                document
                    .getElementById("modalOverlay")
                    .classList.remove("hidden");
                document
                    .querySelectorAll("#modalOverlay > div")
                    .forEach((d) => d.classList.add("hidden"));
                document.getElementById(id).classList.remove("hidden");
                document.body.style.overflow = "hidden";
            }

            function closeModals() {
                document.getElementById("modalOverlay").classList.add("hidden");
                document.body.style.overflow = "auto";
            }
        </script>
    </body>
</html>
